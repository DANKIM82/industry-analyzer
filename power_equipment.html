<title>전력기기 실적 Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f6f7f9;--panel:#ffffff;--text:#18212f;--muted:#667085;--line:#d9dee7;--accent:#f59e0b;--sidebar:#1a1a2e;--sidebar-w:240px;--topbar-h:52px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI","Noto Sans KR",Arial,sans-serif;font-size:14px;}
.topbar{display:none;position:sticky;top:0;z-index:30;height:var(--topbar-h);background:var(--sidebar);color:#e5e7eb;padding:0 16px;align-items:center;gap:12px;}
.topbar .brand{flex:1;font-size:15px;font-weight:700;}
.hamburger{background:none;border:none;cursor:pointer;color:#e5e7eb;padding:6px;display:flex;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:currentColor;border-radius:2px;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;}
.sidebar-overlay.active{display:block;}
.app{display:flex;min-height:100vh;}
aside{width:var(--sidebar-w);background:var(--sidebar);color:#e5e7eb;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.2) transparent;}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;}
.sidebar-header .brand{font-size:13px;font-weight:700;line-height:1.4;color:#f9fafb;}
.sidebar-close{display:none;background:none;border:none;color:#9ca3af;cursor:pointer;font-size:18px;}
.company-list{padding:8px 0;}
.company-list .label{padding:8px 16px 4px;font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;}
.nav button{display:block;width:100%;padding:8px 16px;background:none;border:none;cursor:pointer;color:#9ca3af;font-size:13px;text-align:left;transition:background 0.15s,color 0.15s;}
.nav button:hover{background:rgba(255,255,255,0.06);color:#e5e7eb;}
.nav button.active{background:rgba(255,255,255,0.1);color:#ffffff;font-weight:600;}
main{flex:1;padding:28px 32px;min-width:0;overflow-x:hidden;}
header{margin-bottom:20px;}
header h1{font-size:22px;font-weight:700;color:var(--text);}
header .sub{font-size:13px;color:var(--muted);margin-top:4px;}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;align-items:center;}
.controls button{padding:6px 14px;border-radius:6px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;}
.controls button:hover{border-color:var(--accent);color:var(--accent);}
.controls button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.controls select{padding:6px 10px;border-radius:6px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:13px;cursor:pointer;}
.controls .sep{color:var(--muted);font-size:13px;}
.grid{display:flex;flex-direction:column;gap:20px;}
.panel{background:var(--panel);border-radius:10px;border:1px solid var(--line);padding:20px;overflow:hidden;}
.panel-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.panel-hint{font-size:11px;color:var(--muted);font-weight:400;}
.chart-scroll{overflow-x:auto;padding-bottom:6px;}
.chart-scroll canvas{min-width:600px;}
.legend-area{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;}
.legend-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;font-size:12px;font-weight:500;transition:opacity 0.15s;}
.legend-chip.hidden{opacity:0.35;}
.legend-chip .dot{width:8px;height:8px;border-radius:50%;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:10px 8px;background:var(--bg);font-weight:600;color:var(--muted);border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;}
thead th:first-child{text-align:left;}
thead th:nth-child(2){text-align:left;}
tbody tr{border-bottom:1px solid var(--line);}
tbody tr:hover{background:#f8fafc;}
tbody td{padding:9px 8px;text-align:right;color:var(--text);white-space:nowrap;}
tbody td:first-child{text-align:left;color:var(--muted);font-size:12px;}
tbody td:nth-child(2){text-align:left;font-weight:600;}
.pos{color:#16a34a;}.neg{color:#dc2626;}
.excel-btn{padding:7px 14px;border-radius:6px;background:#16a34a;color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;}
.excel-btn:hover{background:#15803d;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--panel);border-radius:8px;border:1px solid var(--line);padding:14px 16px;}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.kpi-value{font-size:20px;font-weight:700;color:var(--text);}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}
@media(max-width:768px){.topbar{display:flex;}aside{position:fixed;left:-280px;top:0;height:100%;width:260px;z-index:50;transition:left 0.28s ease;box-shadow:4px 0 20px rgba(0,0,0,0.4);}aside.open{left:0;}.sidebar-close{display:block;}main{padding:18px 16px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

function fmt(n,d=0){if(n==null||isNaN(n))return'-';return Number(n).toLocaleString('ko-KR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtPct(n,d=1){if(n==null||isNaN(n))return'-';return Number(n).toFixed(d)+'%';}

function makeLineChart(id,labels,datasets,opts={}){
  const ctx=document.getElementById(id).getContext('2d');
  return new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(15,23,42,0.92)',titleColor:'#94a3b8',bodyColor:'#f1f5f9',padding:10,borderColor:'#334155',borderWidth:1,callbacks:{label:c=>{const v=c.raw;if(v==null)return c.dataset.label+': -';return c.dataset.label+': '+Number(v).toLocaleString('ko-KR')+(opts.unit||'');}}}},scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#6b7280',maxRotation:45}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#6b7280',callback:v=>opts.unit==='%'?v+'%':Number(v).toLocaleString('ko-KR',{maximumFractionDigits:0})}}}}});
}
function makeBarChart(id,labels,datasets,opts={}){
  const ctx=document.getElementById(id).getContext('2d');
  return new Chart(ctx,{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:opts.showLegend||false,position:'bottom',labels:{font:{size:11}}},tooltip:{backgroundColor:'rgba(15,23,42,0.92)',titleColor:'#94a3b8',bodyColor:'#f1f5f9',callbacks:{label:c=>c.dataset.label+': '+Number(c.raw).toLocaleString('ko-KR')+(opts.unit||'')}}},scales:{x:{stacked:opts.stacked||false,grid:{display:false},ticks:{font:{size:11},color:'#6b7280',maxRotation:45}},y:{stacked:opts.stacked||false,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#6b7280',callback:v=>opts.unit==='%'?v+'%':Number(v).toLocaleString('ko-KR',{maximumFractionDigits:0})}}}}});
}
function renderLegend(cid,datasets,chart){
  const el=document.getElementById(cid);if(!el)return;el.innerHTML='';
  datasets.forEach((ds,i)=>{const chip=document.createElement('span');chip.className='legend-chip';chip.style.borderColor=ds.borderColor||COLORS[i];chip.style.color=ds.borderColor||COLORS[i];chip.innerHTML='<span class="dot" style="background:'+(ds.borderColor||COLORS[i])+'"></span>'+ds.label;chip.addEventListener('click',()=>{const m=chart.getDatasetMeta(i);m.hidden=!m.hidden;chip.classList.toggle('hidden',m.hidden);chart.update();});el.appendChild(chip);});
}
function initSidebar(){
  const menuBtn=document.getElementById('menuBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay'),closeBtn=document.getElementById('sidebarClose');
  if(menuBtn)menuBtn.addEventListener('click',()=>{sidebar.classList.add('open');overlay.classList.add('active');});
  if(overlay)overlay.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('active');});
  if(closeBtn)closeBtn.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('active');});
}
function downloadCsv(filename,headers,rows){
  const BOM='\uFEFF';const csv=BOM+[headers.join(','),...rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))].join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

let IS_SAMPLE=true;
function buildLiveData(records){
  const FIELD_MAP={revenue:'revenue',opProfit:'op_income',opMargin:'op_margin',netProfit:'net_income',netMargin:'net_margin',opCashflow:'op_cashflow',eps:'eps',roe:'roe',overseasRevenue:'overseas_revenue',overseasRatio:'overseas_ratio',northAmerica:'north_america',backlog:'backlog',capex:'capex'};
  const quarters=[...new Set(records.map(r=>r.quarter))].sort();
  const names=[...new Set(records.map(r=>r.company))];
  const companies=names.map(name=>{
    const o={name};
    for(const key in FIELD_MAP){const src=FIELD_MAP[key];o[key]=quarters.map(q=>{const r=records.find(x=>x.company===name&&x.quarter===q);const v=r?r[src]:null;return(v==null)?0:v;});}
    return o;
  });
  return{meta:{title:PE_SAMPLE.meta.title,quarters},companies};
}

  eps:{label:'EPS',unit:'원'},roe:{label:'ROE',unit:'%'},
  overseasRevenue:{label:'해외매출',unit:'억원'},overseasRatio:{label:'해외비중',unit:'%'},
  northAmerica:{label:'북미매출',unit:'억원'},backlog:{label:'수주잔고',unit:'억원'},capex:{label:'CAPEX',unit:'억원'}
};

PE_DATA.companies.forEach(c=>{Object.keys(METRIC_LABELS).forEach(k=>{if(!Array.isArray(c[k]))c[k]=PE_DATA.meta.quarters.map(()=>null);});});

Object.keys(METRIC_LABELS).forEach(k=>{
  if(METRIC_LABELS[k].unit==='억원'){
    METRIC_LABELS[k].unit='십억원';
    PE_DATA.companies.forEach(c=>{if(Array.isArray(c[k]))c[k]=c[k].map(v=>(v==null?null:Math.round(v/10)));});
  }
});

document.querySelectorAll('#summaryNav button').forEach(btn=>{btn.addEventListener('click',()=>{currentView=btn.dataset.view;document.querySelectorAll('#summaryNav button,#companyNav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderView();});});
document.querySelectorAll('#companyNav button').forEach(btn=>{btn.addEventListener('click',()=>{currentView='company';currentCompany=btn.dataset.company;document.querySelectorAll('#summaryNav button,#companyNav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderView();});});
document.querySelectorAll('[data-metric]').forEach(btn=>{btn.addEventListener('click',()=>{currentMetric=btn.dataset.metric;document.querySelectorAll('[data-metric]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderView();});});

const qs=PE_DATA.meta.quarters;
const psEl=document.getElementById('periodStart'),peEl=document.getElementById('periodEnd');
qs.forEach((q,i)=>{psEl.appendChild(new Option(q,i));peEl.appendChild(new Option(q,i));});
peEl.value=qs.length-1;
psEl.addEventListener('change',()=>{periodStart=+psEl.value;renderView();});
peEl.addEventListener('change',()=>{periodEnd=+peEl.value;renderView();});

function destroyAll(){Object.values(charts).forEach(c=>{if(c)c.destroy();});Object.keys(charts).forEach(k=>delete charts[k]);}

function renderView(){
  const main=document.getElementById('mainContent');destroyAll();
  const ql=qs.slice(periodStart,periodEnd+1);
  if(currentView==='summary')renderSummaryView(main,ql);
  else if(currentView==='overseas')renderOverseasView(main,ql);
  else if(currentView==='company')renderCompanyView(main,ql);
}

function renderSummaryView(main,ql){
  const ml=METRIC_LABELS[currentMetric];
  const datasets=PE_DATA.companies.map((c,i)=>({label:c.name,data:c[currentMetric].slice(periodStart,periodEnd+1),borderColor:COLORS[i],backgroundColor:COLORS[i]+'18',tension:0.35,borderWidth:2.5,pointRadius:3.5}));
  main.innerHTML=`
    <div class="panel">
      <div class="panel-title">${ml.label} 분기별 추이 <span class="panel-hint">(${ml.unit})</span></div>
      <div class="chart-scroll"><canvas id="mainChart" height="320"></canvas></div>
      <div class="legend-area" id="mainLegend"></div>
    </div>
    <div class="panel" style="margin-top:20px">
      <div class="panel-title">분기별 비교 <button class="excel-btn" onclick="exportSummary()">⬇ CSV</button></div>
      <div style="overflow-x:auto"><table><thead><tr><th>분기</th>${PE_DATA.companies.map(c=>'<th>'+c.name+'</th>').join('')}</tr></thead><tbody id="summaryTbody"></tbody></table></div>
    </div>`;
  charts.main=makeLineChart('mainChart',ql,datasets,{unit:ml.unit});
  renderLegend('mainLegend',datasets,charts.main);
  const tbody=document.getElementById('summaryTbody');
  ql.forEach((q,qi)=>{const ai=periodStart+qi;const tr=document.createElement('tr');const isPct=ml.unit==='%';tr.innerHTML='<td>'+q+'</td>'+PE_DATA.companies.map(c=>{const v=c[currentMetric][ai];if(v==null)return'<td>-</td>';return'<td>'+(isPct?v.toFixed(1)+'%':Number(v).toLocaleString('ko-KR'))+'</td>';}).join('');tbody.appendChild(tr);});
}

function renderOverseasView(main,ql){
  main.innerHTML=`
    <div class="panel">
      <div class="panel-title">해외매출 비중 추이 <span class="panel-hint">(%)</span></div>
      <div class="chart-scroll"><canvas id="overseasRatioChart" height="300"></canvas></div>
      <div class="legend-area" id="overseasRatioLegend"></div>
    </div>
    <div class="two-col" style="margin-top:20px">
      <div class="panel">
        <div class="panel-title">해외매출 추이</div>
        <div class="chart-scroll"><canvas id="overseasRevChart" height="260"></canvas></div>
        <div class="legend-area" id="overseasRevLegend"></div>
      </div>
      <div class="panel">
        <div class="panel-title">북미매출 추이</div>
        <div class="chart-scroll"><canvas id="northAmChart" height="260"></canvas></div>
        <div class="legend-area" id="northAmLegend"></div>
      </div>
    </div>
    <div class="two-col" style="margin-top:20px">
      <div class="panel">
        <div class="panel-title">수주잔고 추이</div>
        <div class="chart-scroll"><canvas id="backlogChart" height="260"></canvas></div>
        <div class="legend-area" id="backlogLegend"></div>
      </div>
      <div class="panel">
        <div class="panel-title">최근분기 해외매출 비교</div>
        <div class="chart-scroll"><canvas id="overseasBarChart" height="260"></canvas></div>
      </div>
    </div>`;

  const ratioDs=PE_DATA.companies.map((c,i)=>({label:c.name,data:c.overseasRatio.slice(periodStart,periodEnd+1),borderColor:COLORS[i],backgroundColor:COLORS[i]+'18',tension:0.35,borderWidth:2,pointRadius:3}));
  charts.ratio=makeLineChart('overseasRatioChart',ql,ratioDs,{unit:'%'});renderLegend('overseasRatioLegend',ratioDs,charts.ratio);

  const revDs=PE_DATA.companies.map((c,i)=>({label:c.name,data:c.overseasRevenue.slice(periodStart,periodEnd+1),borderColor:COLORS[i],backgroundColor:COLORS[i]+'18',tension:0.35,borderWidth:2,pointRadius:3}));
  charts.rev=makeLineChart('overseasRevChart',ql,revDs);renderLegend('overseasRevLegend',revDs,charts.rev);

  const naDs=PE_DATA.companies.map((c,i)=>({label:c.name,data:c.northAmerica.slice(periodStart,periodEnd+1),borderColor:COLORS[i],backgroundColor:COLORS[i]+'18',tension:0.35,borderWidth:2,pointRadius:3}));
  charts.na=makeLineChart('northAmChart',ql,naDs);renderLegend('northAmLegend',naDs,charts.na);

  const blDs=PE_DATA.companies.map((c,i)=>({label:c.name,data:c.backlog.slice(periodStart,periodEnd+1),borderColor:COLORS[i],backgroundColor:COLORS[i]+'18',tension:0.35,borderWidth:2,pointRadius:3}));
  charts.bl=makeLineChart('backlogChart',ql,blDs);renderLegend('backlogLegend',blDs,charts.bl);

  charts.bar=makeBarChart('overseasBarChart',PE_DATA.companies.map(c=>c.name),[
    {label:'해외매출',data:PE_DATA.companies.map(c=>c.overseasRevenue[periodEnd]),backgroundColor:COLORS.map(c=>c+'cc')},
  ],{showLegend:false});
}

function renderCompanyView(main,ql){
  const c=PE_DATA.companies.find(co=>co.name===currentCompany);if(!c)return;
  const latest=periodEnd;
  main.innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">매출액 (최근분기)</div><div class="kpi-value">${fmt(c.revenue[latest])}<span style="font-size:12px;color:#6b7280">십억원</span></div></div>
      <div class="kpi-card"><div class="kpi-label">영업이익</div><div class="kpi-value">${fmt(c.opProfit[latest])}<span style="font-size:12px;color:#6b7280">십억원</span></div><div class="kpi-sub">이익률 ${(c.opMargin[latest]||0).toFixed(1)}%</div></div>
      <div class="kpi-card"><div class="kpi-label">해외매출</div><div class="kpi-value">${fmt(c.overseasRevenue[latest])}<span style="font-size:12px;color:#6b7280">십억원</span></div><div class="kpi-sub">비중 ${(c.overseasRatio[latest]||0).toFixed(1)}%</div></div>
      <div class="kpi-card"><div class="kpi-label">북미매출</div><div class="kpi-value">${fmt(c.northAmerica[latest])}<span style="font-size:12px;color:#6b7280">십억원</span></div></div>
      <div class="kpi-card"><div class="kpi-label">수주잔고</div><div class="kpi-value">${((c.backlog[latest]||0)/100).toFixed(1)}<span style="font-size:12px;color:#6b7280">조원</span></div></div>
      <div class="kpi-card"><div class="kpi-label">ROE</div><div class="kpi-value">${(c.roe[latest]||0).toFixed(1)}<span style="font-size:12px;color:#6b7280">%</span></div></div>
    </div>
    <div class="two-col">
      <div class="panel"><div class="panel-title">매출 / 영업이익</div><div class="chart-scroll"><canvas id="revChart" height="260"></canvas></div></div>
      <div class="panel"><div class="panel-title">해외매출·북미 추이</div><div class="chart-scroll"><canvas id="overseasChart" height="260"></canvas></div></div>
    </div>
    <div class="two-col" style="margin-top:20px">
      <div class="panel"><div class="panel-title">해외비중 추이</div><div class="chart-scroll"><canvas id="ratioChart" height="240"></canvas></div></div>
      <div class="panel"><div class="panel-title">수주잔고 누적</div><div class="chart-scroll"><canvas id="backlogCChart" height="240"></canvas></div></div>
    </div>`;
  charts.rev=makeBarChart('revChart',ql,[{label:'매출액',data:c.revenue.slice(periodStart,periodEnd+1),backgroundColor:'#f59e0b88'},{label:'영업이익',data:c.opProfit.slice(periodStart,periodEnd+1),backgroundColor:'#2563eb88'}],{showLegend:true});
  charts.overseas=makeBarChart('overseasChart',ql,[{label:'해외매출',data:c.overseasRevenue.slice(periodStart,periodEnd+1),backgroundColor:'#16a34a88'},{label:'북미',data:c.northAmerica.slice(periodStart,periodEnd+1),backgroundColor:'#dc262688'}],{showLegend:true});
  charts.ratio=makeLineChart('ratioChart',ql,[{label:'해외비중',data:c.overseasRatio.slice(periodStart,periodEnd+1),borderColor:'#f59e0b',backgroundColor:'#f59e0b22',tension:0.35,borderWidth:2.5,fill:true,pointRadius:4}],{unit:'%'});
  charts.backlog=makeLineChart('backlogCChart',ql,[{label:'수주잔고',data:c.backlog.slice(periodStart,periodEnd+1),borderColor:'#7c3aed',backgroundColor:'#7c3aed22',tension:0.35,borderWidth:2.5,fill:true,pointRadius:4}]);
}

function exportSummary(){
  const ml=METRIC_LABELS[currentMetric];const ql=qs.slice(periodStart,periodEnd+1);
  const headers=['분기',...PE_DATA.companies.map(c=>c.name)];
  const rows=ql.map((q,qi)=>{const ai=periodStart+qi;return[q,...PE_DATA.companies.map(c=>c[currentMetric][ai]??'')];});
  downloadCsv('전력기기_'+ml.label+'.csv',headers,rows);
}

initSidebar();
document.querySelector('[data-metric="revenue"]').classList.add('active');
document.querySelector('[data-view="summary"]').classList.add('active');
renderView();
</script>
</body>
</html>
