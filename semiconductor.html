  :root {

    --panel: #ffffff;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

  .topbar {
    display: none;
    position: sticky; top: 0; z-index: 30;
    height: var(--topbar-h);
    background: var(--sidebar);
    color: #e5e7eb;
    padding: 0 16px;
    align-items: center;
    gap: 12px;

  .topbar .brand { flex: 1; font-size: 15px; font-weight: 700; }
  .hamburger {
    background: none; border: none; cursor: pointer;
    color: #e5e7eb; padding: 6px;

  }
  .hamburger span {
    display: block; width: 22px; height: 2px;
    background: currentColor; border-radius: 2px;
  }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 40;
  }
  .sidebar-overlay.active { display: block; }
  .app { display: flex; min-height: 100vh; }
  aside {
    width: var(--sidebar-w);
    background: var(--sidebar);
    color: #e5e7eb;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header .brand {
    font-size: 13px; font-weight: 700; line-height: 1.4;
    color: #f9fafb;
  }
  .sidebar-close { display: none; background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 18px; }
  .company-list { padding: 8px 0; }
  .company-list .label {
    padding: 8px 16px 4px;
    font-size: 10px; font-weight: 600;
    color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em;

  .nav button {
    display: block; width: 100%;
    padding: 8px 16px;
    background: none; border: none; cursor: pointer;
    color: #9ca3af; font-size: 13px; text-align: left;
    transition: background 0.15s, color 0.15s;
    border-radius: 0;

  .nav button:hover { background: rgba(255,255,255,0.06); color: #e5e7eb; }
  .nav button.active { background: rgba(255,255,255,0.1); color: #ffffff; font-weight: 600; }
  main {
    flex: 1; padding: 28px 32px;
    min-width: 0; overflow-x: hidden;
  }
  header { margin-bottom: 20px; }
  header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  header .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 24px; align-items: center;
  }
  .controls button {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--panel); color: var(--muted);
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .controls select {
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--panel);
    color: var(--text); font-size: 13px; cursor: pointer;
  }
  .controls .sep { color: var(--muted); font-size: 13px; }
  .grid { display: flex; flex-direction: column; gap: 20px; }
  .panel {
    background: var(--panel); border-radius: 10px;
    border: 1px solid var(--line);
    padding: 20px;
    overflow: hidden;
  }
  .panel-title {
    font-size: 15px; font-weight: 600; color: var(--text);
    margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-hint { font-size: 11px; color: var(--muted); font-weight: 400; }
  .chart-wrap { position: relative; width: 100%; overflow: hidden; }
  .chart-scroll { overflow-x: auto; padding-bottom: 6px; }
  .chart-scroll canvas { min-width: 600px; }
  .legend-area {
    margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .legend-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    border: 1.5px solid; cursor: pointer;
    font-size: 12px; font-weight: 500;
    transition: opacity 0.15s;
  }
  .legend-chip.hidden { opacity: 0.35; }
  .legend-chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .btn-sm {
    padding: 5px 12px; border-radius: 5px;
    border: 1px solid var(--line);
    background: var(--panel); color: var(--muted);
    cursor: pointer; font-size: 12px;
  }
  .btn-sm:hover { background: var(--bg); }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    padding: 10px 8px; background: var(--bg);
    font-weight: 600; color: var(--muted);
    border-bottom: 1px solid var(--line);
    text-align: right; white-space: nowrap;

  thead th:first-child { text-align: left; }
  thead th:nth-child(2) { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:hover { background: #f8fafc; }
  tbody td {

    color: var(--text); white-space: nowrap;

  .pos { color: #16a34a; }
  .neg { color: #dc2626; }
  .excel-btn {

  .kpi-grid {

    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));

  .kpi-card {

const COLORS = [
  '#2563eb','#16a34a','#dc2626','#d97706','#7c3aed',
  '#db2777','#0891b2','#65a30d','#ea580c','#9333ea',
  '#0284c7','#059669','#b91c1c','#b45309','#6d28d9'
];

function fmt(n, digits=0) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toLocaleString('ko-KR', {minimumFractionDigits: digits, maximumFractionDigits: digits});
}
function fmtPct(n, digits=1) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toFixed(digits) + '%';
}
function fmtChange(n, unit='') {
  if (n === null || n === undefined || isNaN(n)) return '-';
  const sign = n > 0 ? '+' : '';
  return sign + Number(n).toLocaleString('ko-KR') + unit;
}
function arrow(n) {
  if (!n || isNaN(n)) return '';
  return n > 0 ? '<span class="pos">▲</span>' : '<span class="neg">▼</span>';
}

// 범용 라인 차트 생성
function makeLineChart(canvasId, labels, datasets, opts={}) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: opts.ratio || false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.92)',
          titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          padding: 10, borderColor: '#334155', borderWidth: 1,
          callbacks: {
            label: function(ctx) {
              const v = ctx.raw;
              if (v === null || v === undefined) return ctx.dataset.label + ': -';
              const unit = opts.unit || '';
              return ctx.dataset.label + ': ' + Number(v).toLocaleString('ko-KR') + unit;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#6b7280', maxRotation: 45 }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: {
            font: { size: 11 }, color: '#6b7280',
            callback: function(v) {
              if (Math.abs(v) >= 10000) return (v/10000).toFixed(1) + '만';
              if (Math.abs(v) >= 1000) return (v/1000).toFixed(0) + 'K';
              return v + (opts.unit || '');
            }
          }
        },
        ...(opts.y2 ? {
          y1: {
            type: 'linear', position: 'right',
            grid: { drawOnChartArea: false },
            ticks: {
              font: { size: 11 }, color: '#6b7280',
              callback: v => v.toFixed(1) + '%'
            }
          }
        } : {})
      }
    }
  });
}

// 막대 차트 생성
function makeBarChart(canvasId, labels, datasets, opts={}) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: opts.showLegend || false, position: 'bottom', labels: { font: { size: 11 } } },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.92)',
          titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + Number(ctx.raw).toLocaleString('ko-KR') + (opts.unit || '')
          }
        }
      },
      scales: {
        x: {
          stacked: opts.stacked || false,
          grid: { display: false },
          ticks: { font: { size: 11 }, color: '#6b7280', maxRotation: 45 }
        },
        y: {
          stacked: opts.stacked || false,
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: {
            font: { size: 11 }, color: '#6b7280',
            callback: function(v) {
              if (Math.abs(v) >= 10000) return (v/10000).toFixed(0) + '만';
              if (Math.abs(v) >= 1000) return (v/1000).toFixed(0) + 'K';
              return v + (opts.unit || '');
            }
          }
        }
      }
    }
  });
}

// 도넛 차트 생성
function makeDonutChart(canvasId, labels, data, colors) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.label + ': ' + ctx.raw.toFixed(1) + '%'
          }
        }
      },
      cutout: '60%'
    }
  });
}

// 범례 칩 렌더링
function renderLegend(containerId, datasets, chart) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  datasets.forEach((ds, i) => {
    const chip = document.createElement('span');
    chip.className = 'legend-chip';
    chip.style.borderColor = ds.borderColor || COLORS[i];
    chip.style.color = ds.borderColor || COLORS[i];
    chip.innerHTML = '<span class="dot" style="background:' + (ds.borderColor||COLORS[i]) + '"></span>' + ds.label;
    chip.addEventListener('click', () => {
      const meta = chart.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      chip.classList.toggle('hidden', meta.hidden);
      chart.update();
    });
    el.appendChild(chip);
  });
}

// 사이드바 모바일 토글
function initSidebar() {
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const closeBtn = document.getElementById('sidebarClose');
  if (menuBtn) menuBtn.addEventListener('click', () => {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  });
  if (overlay) overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
  if (closeBtn) closeBtn.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
}

// 엑셀 다운로드 (CSV 방식)
function downloadCsv(filename, headers, rows) {
  const BOM = '\uFEFF';
  const csv = BOM + [headers.join(','), ...rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','))].join('\r\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

let currentView = 'summary';
let currentMetric = 'revenue';
let currentFilter = 'all';
let periodStart = 0;
let periodEnd = SEMI_DATA.meta.quarters.length - 1;
let currentCompany = SEMI_DATA.companies[0].name;
const charts = {};

const METRIC_LABELS = {
  revenue: { label: '매출액', unit: '억원' },
  opProfit: { label: '영업이익', unit: '억원' },
  opMargin: { label: '영업이익률', unit: '%' },
  capex: { label: '설비투자(CAPEX)', unit: '억원' },
  hbmRevenue: { label: 'HBM 매출', unit: '억원' },
  inventory: { label: '재고자산', unit: '억원' }
};

const SEG_LABELS = { memory: '메모리', foundry: '파운드리', equipment: '장비/소재' };

document.querySelectorAll('#summaryNav button').forEach(btn => {
  btn.addEventListener('click', () => {
    currentView = btn.dataset.view;
    document.querySelectorAll('#summaryNav button, #companyNav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderView();
  });
});
document.querySelectorAll('#companyNav button').forEach(btn => {
  btn.addEventListener('click', () => {
    currentView = 'company';
    currentCompany = btn.dataset.company;
    document.querySelectorAll('#summaryNav button, #companyNav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderView();
  });
});
document.querySelectorAll('[data-metric]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentMetric = btn.dataset.metric;
    document.querySelectorAll('[data-metric]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderView();
  });
});
document.querySelectorAll('[data-seg]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.seg;
    document.querySelectorAll('[data-seg]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderView();
  });
});

const qs = SEMI_DATA.meta.quarters;
const psEl = document.getElementById('periodStart');
const peEl = document.getElementById('periodEnd');
qs.forEach((q,i) => { psEl.appendChild(new Option(q,i)); peEl.appendChild(new Option(q,i)); });
peEl.value = qs.length - 1;
psEl.addEventListener('change', () => { periodStart = +psEl.value; renderView(); });
peEl.addEventListener('change', () => { periodEnd = +peEl.value; renderView(); });

function filteredCompanies() {
  return currentFilter === 'all' ? SEMI_DATA.companies : SEMI_DATA.companies.filter(c => c.segment === currentFilter);
}

function destroyAll() {
  Object.values(charts).forEach(c => { if(c) c.destroy(); });
  Object.keys(charts).forEach(k => delete charts[k]);
}

function renderView() {
  const main = document.getElementById('mainContent');
  destroyAll();
  const ql = qs.slice(periodStart, periodEnd + 1);
  if (currentView === 'summary') renderSummaryView(main, ql);
  else if (currentView === 'hbm') renderHbmView(main, ql);
  else if (currentView === 'company') renderCompanyView(main, ql);
}

function renderSummaryView(main, ql) {
  const companies = filteredCompanies();
  const ml = METRIC_LABELS[currentMetric];
  const datasets = companies.map((c, i) => ({
    label: c.name, data: c[currentMetric].slice(periodStart, periodEnd+1),
    borderColor: COLORS[i], backgroundColor: COLORS[i]+'18',
    tension: 0.35, borderWidth: 2.5, pointRadius: 3.5, spanGaps: true
  }));
  main.innerHTML = `
    <div class="panel">
      <div class="panel-title">${ml.label} 분기별 추이 <span class="panel-hint">(${ml.unit})</span></div>
      <div class="chart-scroll"><canvas id="mainChart" height="320"></canvas></div>
      <div class="legend-area" id="mainLegend"></div>
    </div>
    <div class="panel" style="margin-top:20px">
      <div class="panel-title">분기별 비교 <button class="excel-btn" onclick="exportSummary()">⬇ CSV</button></div>
      <div style="overflow-x:auto"><table><thead><tr>
        <th>분기</th>${companies.map(c=>'<th>'+c.name+'<br><span style=\"font-size:10px;color:#94a3b8\">'+SEG_LABELS[c.segment]+'</span></th>').join('')}
      </tr></thead><tbody id="summaryTbody"></tbody></table></div>
    </div>
  `;
  charts.main = makeLineChart('mainChart', ql, datasets, { unit: ml.unit === '%' ? '%' : '' });
  renderLegend('mainLegend', datasets, charts.main);
  const tbody = document.getElementById('summaryTbody');
  ql.forEach((q,qi) => {
    const ai = periodStart+qi;
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>' + q + '</td>' + companies.map(c => {
      const v = c[currentMetric][ai];
      if(v == null) return '<td>-</td>';
      const isPct = ml.unit === '%';
      const isNeg = currentMetric === 'opProfit' && v < 0;
      return '<td class="' + (isNeg ? 'neg' : '') + '">' + (isPct ? v.toFixed(1)+'%' : Number(v).toLocaleString('ko-KR')) + '</td>';
    }).join('');
    tbody.appendChild(tr);
  });
}

function renderHbmView(main, ql) {
  const memCos = SEMI_DATA.companies.filter(c => c.segment === 'memory' || c.hbmRevenue.some(v=>v));
  const equip = SEMI_DATA.companies.filter(c => c.segment === 'equipment');
  main.innerHTML = `
    <div class="panel">
      <div class="panel-title">HBM 매출 추이 <span class="panel-hint">(AI 반도체 수요 핵심 지표)</span></div>
      <div class="chart-scroll"><canvas id="hbmChart" height="300"></canvas></div>
      <div class="legend-area" id="hbmLegend"></div>
    </div>
    <div class="two-col" style="margin-top:20px">
      <div class="panel">
        <div class="panel-title">메모리 영업이익률 사이클</div>
        <div class="chart-scroll"><canvas id="memMarginChart" height="260"></canvas></div>
        <div class="legend-area" id="memMarginLegend"></div>
      </div>
      <div class="panel">
        <div class="panel-title">메모리 재고자산 추이</div>
        <div class="chart-scroll"><canvas id="invChart" height="260"></canvas></div>
        <div class="legend-area" id="invLegend"></div>
      </div>
    </div>
    <div class="panel" style="margin-top:20px">
      <div class="panel-title">반도체 장비사 영업이익률 비교</div>
      <div class="chart-scroll"><canvas id="equipMarginChart" height="260"></canvas></div>
      <div class="legend-area" id="equipMarginLegend"></div>
    </div>
  `;

  const hbmCos = SEMI_DATA.companies.filter(c => c.hbmRevenue.some(v=>v));
  const hbmDs = hbmCos.map((c,i) => ({
    label: c.name, data: c.hbmRevenue.slice(periodStart, periodEnd+1),
    borderColor: COLORS[i], backgroundColor: COLORS[i]+'18',
    tension: 0.35, borderWidth: 2.5, pointRadius: 4, spanGaps: true
  }));
  charts.hbm = makeLineChart('hbmChart', ql, hbmDs);
  renderLegend('hbmLegend', hbmDs, charts.hbm);

  const memCosOnly = SEMI_DATA.companies.filter(c => c.segment === 'memory');
  const memDs = memCosOnly.map((c,i) => ({
    label: c.name, data: c.opMargin.slice(periodStart, periodEnd+1),
    borderColor: COLORS[i], backgroundColor: COLORS[i]+'18',
    tension: 0.35, borderWidth: 2, pointRadius: 3
  }));
  charts.memMargin = makeLineChart('memMarginChart', ql, memDs, { unit: '%' });
  renderLegend('memMarginLegend', memDs, charts.memMargin);

  const invDs = memCosOnly.map((c,i) => ({
    label: c.name, data: c.inventory.slice(periodStart, periodEnd+1),
    borderColor: COLORS[i], backgroundColor: COLORS[i]+'18',
    tension: 0.35, borderWidth: 2, pointRadius: 3
  }));
  charts.inv = makeLineChart('invChart', ql, invDs);
  renderLegend('invLegend', invDs, charts.inv);

  const equipDs = equip.map((c,i) => ({
    label: c.name, data: c.opMargin.slice(periodStart, periodEnd+1),
    borderColor: COLORS[i+3], backgroundColor: COLORS[i+3]+'18',
    tension: 0.35, borderWidth: 2, pointRadius: 3
  }));
  charts.equipMargin = makeLineChart('equipMarginChart', ql, equipDs, { unit: '%' });
  renderLegend('equipMarginLegend', equipDs, charts.equipMargin);
}

function renderCompanyView(main, ql) {
  const c = SEMI_DATA.companies.find(co => co.name === currentCompany);
  if (!c) return;
  const latest = periodEnd;
  const yoyIdx = latest >= 4 ? latest-4 : null;
  const revYoY = yoyIdx !== null ? ((c.revenue[latest]-c.revenue[yoyIdx])/c.revenue[yoyIdx]*100).toFixed(1) : null;
  const hbmLatest = c.hbmRevenue[latest];

  main.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">매출액 <span style="font-size:10px;color:#94a3b8">[${SEG_LABELS[c.segment]}]</span></div>
        <div class="kpi-value">${(c.revenue[latest]/10000).toFixed(1)}<span style="font-size:12px;color:#6b7280">조원</span></div>
        ${revYoY ? '<div class="kpi-sub ' + (revYoY>=0?'kpi-up':'kpi-dn') + '">' + (revYoY>=0?'▲':'▼') + Math.abs(revYoY) + '% YoY</div>' : ''}
      </div>
      <div class="kpi-card">
        <div class="kpi-label">영업이익</div>
        <div class="kpi-value ${c.opProfit[latest]>=0?'':'neg'}">${(c.opProfit[latest]/10000).toFixed(2)}<span style="font-size:12px;color:#6b7280">조원</span></div>
        <div class="kpi-sub">이익률 ${c.opMargin[latest].toFixed(1)}%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">CAPEX</div>
        <div class="kpi-value">${Number(c.capex[latest]).toLocaleString('ko-KR')}<span style="font-size:12px;color:#6b7280">억원</span></div>
      </div>
      ${hbmLatest ? '<div class="kpi-card"><div class="kpi-label">HBM 매출</div><div class="kpi-value">' + (hbmLatest/10000).toFixed(2) + '<span style="font-size:12px;color:#6b7280">조원</span></div><div class="kpi-sub">전체의 ' + (hbmLatest/c.revenue[latest]*100).toFixed(1) + '%</div></div>' : ''}
      <div class="kpi-card">
        <div class="kpi-label">재고자산</div>
        <div class="kpi-value">${Number(c.inventory[latest]).toLocaleString('ko-KR')}<span style="font-size:12px;color:#6b7280">억원</span></div>
      </div>
    </div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">매출 / 영업이익</div>
        <div class="chart-scroll"><canvas id="revChart" height="260"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">영업이익률 추이</div>
        <div class="chart-scroll"><canvas id="marginChart" height="260"></canvas></div>
      </div>
    </div>
    ${c.hbmRevenue.some(v=>v) ? `
    <div class="two-col" style="margin-top:20px">
      <div class="panel">
        <div class="panel-title">HBM 매출 추이</div>
        <div class="chart-scroll"><canvas id="hbmChart" height="240"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">CAPEX / 재고자산</div>
        <div class="chart-scroll"><canvas id="capexChart" height="240"></canvas></div>
      </div>
    </div>` : `<div class="panel" style="margin-top:20px">
      <div class="panel-title">CAPEX / 재고자산</div>
      <div class="chart-scroll"><canvas id="capexChart" height="240"></canvas></div>
    </div>`}
  `;

  charts.rev = makeBarChart('revChart', ql, [
    { label: '매출액', data: c.revenue.slice(periodStart, periodEnd+1), backgroundColor: '#7c3aed88' },
    { label: '영업이익', data: c.opProfit.slice(periodStart, periodEnd+1), backgroundColor: '#16a34a88' }
  ], { showLegend: true });
  charts.margin = makeLineChart('marginChart', ql, [{
    label: '영업이익률', data: c.opMargin.slice(periodStart, periodEnd+1),
    borderColor: '#7c3aed', backgroundColor: '#7c3aed22',
    tension: 0.35, borderWidth: 2.5, fill: true, pointRadius: 4
  }], { unit: '%' });

  if (c.hbmRevenue.some(v=>v)) {
    charts.hbm = makeLineChart('hbmChart', ql, [{
      label: 'HBM 매출', data: c.hbmRevenue.slice(periodStart, periodEnd+1),
      borderColor: '#ea580c', backgroundColor: '#ea580c22',
      tension: 0.35, borderWidth: 2.5, fill: true, pointRadius: 4, spanGaps: true
    }]);
  }
  charts.capex = makeLineChart('capexChart', ql, [
    { label: 'CAPEX', data: c.capex.slice(periodStart, periodEnd+1), borderColor: '#0891b2', backgroundColor: '#0891b222', tension: 0.35, borderWidth: 2, pointRadius: 3 },
    { label: '재고자산', data: c.inventory.slice(periodStart, periodEnd+1), borderColor: '#d97706', backgroundColor: '#d9770622', tension: 0.35, borderWidth: 2, pointRadius: 3 }
  ]);
}

function exportSummary() {
  const companies = filteredCompanies();
  const ml = METRIC_LABELS[currentMetric];
  const ql = qs.slice(periodStart, periodEnd+1);
  const headers = ['분기', ...companies.map(c=>c.name)];
  const rows = ql.map((q,qi) => {
    const ai = periodStart+qi;
    return [q, ...companies.map(c => c[currentMetric][ai] ?? '')];
  });
  downloadCsv('반도체_' + ml.label + '.csv', headers, rows);
}

initSidebar();
document.querySelector('[data-seg="all"]').classList.add('active');
document.querySelector('[data-metric="revenue"]').classList.add('active');
document.querySelector('[data-view="summary"]').classList.add('active');
renderView();

  </script>
