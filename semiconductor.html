<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국내 주요 반도체기업 실적 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>

  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --text: #18212f;
    --muted: #667085;
    --line: #d9dee7;
    --accent: #1f6feb;
    --sidebar: #111827;
    --sidebar-w: 240px;
    --topbar-h: 52px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
    font-size: 14px;
  }
  .topbar {
    display: none;
    position: sticky; top: 0; z-index: 30;
    height: var(--topbar-h);
    background: var(--sidebar);
    color: #e5e7eb;
    padding: 0 16px;
    align-items: center;
    gap: 12px;
  }
  .topbar .brand { flex: 1; font-size: 15px; font-weight: 700; }
  .hamburger {
    background: none; border: none; cursor: pointer;
    color: #e5e7eb; padding: 6px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .hamburger span {
    display: block; width: 22px; height: 2px;
    background: currentColor; border-radius: 2px;
  }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 40;
  }
  .sidebar-overlay.active { display: block; }
  .app { display: flex; min-height: 100vh; }
  aside {
    width: var(--sidebar-w);
    background: var(--sidebar);
    color: #e5e7eb;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header .brand {
    font-size: 13px; font-weight: 700; line-height: 1.4;
    color: #f9fafb;
  }
  .sidebar-close { display: none; background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 18px; }
  .company-list { padding: 8px 0; }
  .company-list .label {
    padding: 8px 16px 4px;
    font-size: 10px; font-weight: 600;
    color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .nav button {
    display: block; width: 100%;
    padding: 8px 16px;
    background: none; border: none; cursor: pointer;
    color: #9ca3af; font-size: 13px; text-align: left;
    transition: background 0.15s, color 0.15s;
    border-radius: 0;
  }
  .nav button:hover { background: rgba(255,255,255,0.06); color: #e5e7eb; }
  .nav button.active { background: rgba(255,255,255,0.1); color: #ffffff; font-weight: 600; }
  main {
    flex: 1; padding: 28px 32px;
    min-width: 0; overflow-x: hidden;
  }
  header { margin-bottom: 20px; }
  header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  header .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 24px; align-items: center;
  }
  .controls button {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--panel); color: var(--muted);
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .controls select {
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--panel);
    color: var(--text); font-size: 13px; cursor: pointer;
  }
  .controls .sep { color: var(--muted); font-size: 13px; }
  .grid { display: flex; flex-direction: column; gap: 20px; }
  .panel {
    background: var(--panel); border-radius: 10px;
    border: 1px solid var(--line);
    padding: 20px;
    overflow: hidden;
  }
  .panel-title {
    font-size: 15px; font-weight: 600; color: var(--text);
    margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-hint { font-size: 11px; color: var(--muted); font-weight: 400; }
  .chart-wrap { position: relative; width: 100%; overflow: hidden; }
  .chart-scroll { overflow-x: auto; padding-bottom: 6px; }
  .chart-scroll canvas { min-width: 600px; }
  .legend-area {
    margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .legend-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    border: 1.5px solid; cursor: pointer;
    font-size: 12px; font-weight: 500;
    transition: opacity 0.15s;
  }
  .legend-chip.hidden { opacity: 0.35; }
  .legend-chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .btn-sm {
    padding: 5px 12px; border-radius: 5px;
    border: 1px solid var(--line);
    background: var(--panel); color: var(--muted);
    cursor: pointer; font-size: 12px;
  }
  .btn-sm:hover { background: var(--bg); }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    padding: 10px 8px; background: var(--bg);
    font-weight: 600; color: var(--muted);
    border-bottom: 1px solid var(--line);
    text-align: right; white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  thead th:nth-child(2) { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:hover { background: #f8fafc; }
  tbody td {
    padding: 9px 8px; text-align: right;
    color: var(--text); white-space: nowrap;
  }
  tbody td:first-child { text-align: left; color: var(--muted); font-size: 12px; }
  tbody td:nth-child(2) { text-align: left; font-weight: 600; }
  .pos { color: #16a34a; }
  .neg { color: #dc2626; }
  .excel-btn {
    padding: 7px 14px; border-radius: 6px;
    background: #16a34a; color: #fff;
    border: none; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .excel-btn:hover { background: #15803d; }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--panel); border-radius: 8px;
    border: 1px solid var(--line); padding: 14px 16px;
  }
  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .kpi-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .kpi-up { color: #16a34a; }
  .kpi-dn { color: #dc2626; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
  @media(max-width: 768px) {
    .topbar { display: flex; }
    aside {
      position: fixed; left: -280px; top: 0; height: 100%;
      width: 260px; z-index: 50;
      transition: left 0.28s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.4);
    }
    aside.open { left: 0; }
    .sidebar-close { display: block; }
    main { padding: 18px 16px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }


  :root {
    --accent: #7c3aed;
    --sidebar: #13002a;
  }
  aside .nav button.active { background: #7c3aed22; color: #7c3aed; }
  aside .nav button:hover { background: rgba(255,255,255,0.06); }
  .controls button.active { background: #7c3aed; border-color: #7c3aed; }


  /* ============================================================
     GLOBAL SEMI WATCH (GSW) — Dark Analytical theme
     Scoped to body.gsw-active so domestic light pages are untouched.
     ============================================================ */
  body.gsw-active {
    --g-bg:#0B1220; --g-card:#141C2E; --g-elev:#1C2740; --g-line:#243049;
    --g-hi:#E6ECF5; --g-lo:#8A97AD; --g-grid:rgba(255,255,255,0.06);
    --sig-green:#22C55E; --sig-amber:#F5B301; --sig-red:#EF4444;
    --acc-a:#2DD4BF; --acc-b:#EF4444; --acc-c:#FBBF24; --est:#A78BFA;
  }
  body.gsw-active.gsw-light {
    --g-bg:#F4F6FB; --g-card:#FFFFFF; --g-elev:#EEF2F9; --g-line:#D9E0EC;
    --g-hi:#1A2332; --g-lo:#5B6675; --g-grid:rgba(0,0,0,0.06);
  }
  body.gsw-active main { background: var(--g-bg); color: var(--g-hi); transition: background .2s; }
  body.gsw-active header h1 { color: var(--g-hi); }
  body.gsw-active header .sub { color: var(--g-lo); }
  body.gsw-active aside .nav button[data-view="gsw"].active {
    background: linear-gradient(90deg, var(--sig-green) 0%, transparent 3px), rgba(45,212,191,.12);
    color:#fff; box-shadow: inset 3px 0 0 var(--phase-color, var(--sig-green));
  }

  .gsw { color: var(--g-hi); font-size:13px; }
  .gsw .gsw-topbar {
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:10px 14px; margin-bottom:16px; border-radius:10px;
    background:var(--g-card); border:1px solid var(--g-line);
    border-left:4px solid var(--phase-color, var(--sig-green));
  }
  .gsw .gsw-topbar .ttl { font-size:16px; font-weight:800; letter-spacing:.06em; }
  .gsw .gsw-topbar .meta { color:var(--g-lo); font-size:11px; }
  .gsw .gsw-topbar .spacer { flex:1; }
  .gsw .seg-ctl { display:inline-flex; border:1px solid var(--g-line); border-radius:7px; overflow:hidden; }
  .gsw .seg-ctl button { background:transparent; border:none; color:var(--g-lo); padding:5px 11px; cursor:pointer; font-size:12px; font-weight:600; }
  .gsw .seg-ctl button.active { background:var(--g-elev); color:var(--g-hi); }
  .gsw .theme-btn, .gsw .csv-btn {
    background:var(--g-elev); border:1px solid var(--g-line); color:var(--g-hi);
    border-radius:7px; padding:5px 12px; cursor:pointer; font-size:12px; font-weight:600;
  }

  /* Level 1 hero */
  .gsw .l1 { display:grid; grid-template-columns: 1.1fr 1.1fr 2fr; gap:14px; margin-bottom:16px; }
  .gsw .hero { background:var(--g-card); border:1px solid var(--g-line); border-radius:12px; padding:16px 18px; }
  .gsw .hero .cap { font-size:10px; letter-spacing:.12em; color:var(--g-lo); text-transform:uppercase; margin-bottom:8px; }
  .gsw .phase-badge {
    display:inline-block; font-size:26px; font-weight:900; letter-spacing:.05em;
    padding:6px 18px; border-radius:10px; color:#0B1220;
  }
  .gsw .phase-badge.boom { background:var(--sig-green); }
  .gsw .phase-badge.recovery { background:var(--sig-amber); }
  .gsw .phase-badge.trough, .gsw .phase-badge.correction { background:var(--sig-red); color:#fff; }
  .gsw .hero .big { font-size:30px; font-weight:800; line-height:1.1; margin-top:6px; }
  .gsw .hero .qoq { font-size:12px; margin-top:6px; color:var(--g-lo); }
  .gsw .up { color:var(--sig-green); } .gsw .dn { color:var(--sig-red); }
  .gsw .gauge-wrap { position:relative; height:120px; }
  .gsw .gauge-label { position:absolute; left:0; right:0; bottom:6px; text-align:center; font-size:11px; color:var(--g-lo); }
  .gsw .summary-lines { list-style:none; margin:2px 0 0; padding:0; }
  .gsw .summary-lines li { display:flex; gap:8px; align-items:flex-start; padding:6px 0; border-bottom:1px solid var(--g-line); font-size:12.5px; line-height:1.5; }
  .gsw .summary-lines li:last-child { border-bottom:none; }
  .gsw .summary-lines .dot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; }

  /* collapsible module cards */
  .gsw .mod { background:var(--g-card); border:1px solid var(--g-line); border-radius:12px; margin-bottom:14px; overflow:hidden; }
  .gsw .mod > .mod-head {
    display:flex; align-items:center; gap:10px; padding:13px 16px; cursor:pointer;
    border-left:4px solid var(--mc, var(--acc-a)); user-select:none;
  }
  .gsw .mod > .mod-head .mtag { font-size:10px; font-weight:800; letter-spacing:.1em; color:var(--mc, var(--acc-a)); }
  .gsw .mod > .mod-head h3 { font-size:14.5px; font-weight:700; }
  .gsw .mod > .mod-head .mhint { color:var(--g-lo); font-size:11px; font-weight:400; }
  .gsw .mod > .mod-head .chev { margin-left:auto; color:var(--g-lo); transition:transform .2s; }
  .gsw .mod.collapsed > .mod-head .chev { transform:rotate(-90deg); }
  .gsw .mod .mod-body { padding:4px 16px 18px; }
  .gsw .mod.collapsed .mod-body { display:none; }

  .gsw .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .gsw .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media(max-width:1100px){ .gsw .l1, .gsw .grid2, .gsw .grid3 { grid-template-columns:1fr; } }
  .gsw .sub-panel { background:var(--g-bg); border:1px solid var(--g-line); border-radius:10px; padding:12px 14px; }
  body.gsw-light .gsw .sub-panel { background:var(--g-elev); }
  .gsw .sp-title { font-size:12px; font-weight:700; color:var(--g-hi); margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; }
  .gsw .sp-hint { font-size:10.5px; color:var(--g-lo); font-weight:400; }
  .gsw .chart-box { position:relative; height:230px; }
  .gsw .chart-box.sm { height:200px; }
  .gsw .chart-box.tall { height:280px; }

  /* legend chips */
  .gsw .legend { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .gsw .chip { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:14px; border:1.5px solid; cursor:pointer; font-size:11px; font-weight:600; }
  .gsw .chip.off { opacity:.35; }
  .gsw .chip .cdot { width:8px; height:8px; border-radius:50%; }
  .gsw .chip.est { border-style:dashed; }

  /* tables */
  .gsw table { width:100%; border-collapse:collapse; font-size:12px; }
  .gsw thead th { padding:8px 7px; background:var(--g-bg); color:var(--g-lo); font-weight:600; border-bottom:1px solid var(--g-line); text-align:right; white-space:nowrap; }
  body.gsw-light .gsw thead th { background:var(--g-elev); }
  .gsw thead th:first-child, .gsw tbody td:first-child { text-align:left; }
  .gsw tbody td { padding:7px; text-align:right; border-bottom:1px solid var(--g-line); color:var(--g-hi); white-space:nowrap; }
  .gsw tbody tr.est-row { border-left:2px dashed var(--est); background:rgba(167,139,250,.05); }
  .gsw tbody tr.grp td { background:var(--g-bg); color:var(--g-lo); font-weight:700; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; }
  .gsw tbody tr.hl td { background:rgba(245,179,1,.08); }
  .gsw .conf-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-left:4px; }

  /* est / aud badges */
  .gsw .badge { font-size:9px; font-weight:800; padding:1px 6px; border-radius:9px; letter-spacing:.04em; }
  .gsw .badge.est { background:rgba(167,139,250,.18); color:var(--est); border:1px dashed var(--est); }
  .gsw .badge.aud { background:var(--g-elev); color:var(--g-lo); }

  /* heatmap */
  .gsw .heat { display:grid; gap:3px; }
  .gsw .heat .hc { padding:9px 6px; border-radius:5px; text-align:center; font-size:11px; font-weight:700; color:#0B1220; }
  .gsw .heat .hl-lbl { background:transparent; color:var(--g-lo); font-weight:600; text-align:left; padding:9px 6px; font-size:11px; }
  .gsw .heat .hl-col { color:var(--g-lo); font-weight:600; font-size:10px; text-align:center; padding:4px; }

  /* timeline */
  .gsw .tl-row { display:grid; grid-template-columns:130px 1fr 90px; gap:8px; align-items:center; padding:7px 0; border-bottom:1px solid var(--g-line); font-size:11.5px; }
  .gsw .tl-row .tl-lab { color:var(--g-hi); font-weight:600; }
  .gsw .tl-bar { height:8px; border-radius:4px; background:var(--g-elev); position:relative; }
  .gsw .tl-bar > span { position:absolute; left:0; top:0; bottom:0; border-radius:4px; }
  .gsw .tl-gap { color:var(--sig-red); font-weight:700; text-align:right; }

  /* backtest strip */
  .gsw .bt-strip { display:flex; gap:2px; margin-top:6px; }
  .gsw .bt-cell { flex:1; height:22px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:8px; color:#0B1220; font-weight:700; }
  .gsw .bt-ok { background:var(--sig-green); } .gsw .bt-no { background:var(--sig-red); color:#fff; }
  .gsw .bt-lab { font-size:9px; color:var(--g-lo); text-align:center; margin-top:2px; }

  /* signal pills */
  .gsw .sig { font-size:10px; font-weight:800; padding:2px 8px; border-radius:10px; }
  .gsw .sig.long { background:rgba(34,197,94,.18); color:var(--sig-green); }
  .gsw .sig.neutral { background:rgba(245,179,1,.18); color:var(--sig-amber); }
  .gsw .sig.short { background:rgba(239,68,68,.18); color:var(--sig-red); }

  /* modal */
  .gsw-modal { position:fixed; inset:0; background:rgba(3,7,18,.7); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
  .gsw-modal.open { display:flex; }
  .gsw-modal .mbox { background:#141C2E; border:1px solid #243049; border-radius:14px; padding:22px; max-width:560px; width:100%; color:#E6ECF5; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  body.gsw-light .gsw-modal .mbox { background:#fff; color:#1A2332; border-color:#D9E0EC; }
  .gsw-modal .mbox h3 { font-size:15px; margin-bottom:4px; }
  .gsw-modal .mbox .mclose { float:right; cursor:pointer; color:#8A97AD; font-size:18px; background:none; border:none; }
  .gsw-modal .wf-row { display:grid; grid-template-columns:160px 1fr 64px; gap:10px; align-items:center; padding:7px 0; border-bottom:1px solid #243049; font-size:12px; }
  body.gsw-light .gsw-modal .wf-row { border-color:#eef; }
  .gsw-modal .wf-bar { height:14px; border-radius:3px; position:relative; background:rgba(255,255,255,.04); }
  .gsw-modal .wf-bar > span { position:absolute; top:0; bottom:0; border-radius:3px; }

  .gsw .note { font-size:11px; color:var(--g-lo); line-height:1.6; margin-top:8px; }
  .gsw .note b { color:var(--g-hi); }
  .gsw .src-pill { display:inline-block; background:var(--g-elev); border:1px solid var(--g-line); border-radius:9px; padding:1px 7px; font-size:10px; color:var(--est); margin:2px 3px 0 0; }

  /* Module D — foundry node evolution + era history */
  .gsw .chart-box.foundry { height:360px; }
  .gsw .era { border:1px solid var(--g-line); border-radius:10px; padding:12px 14px; margin-bottom:10px; background:var(--g-bg); border-left:4px solid var(--era-c, var(--g-lo)); }
  body.gsw-light .gsw .era { background:var(--g-elev); }
  .gsw .era-head { display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap; }
  .gsw .era-period { font-size:11px; font-weight:800; letter-spacing:.04em; color:#0B1220; background:var(--g-hi); padding:2px 9px; border-radius:10px; }
  body.gsw-light .gsw .era-period { color:#fff; background:#1A2332; }
  .gsw .era-title { font-size:13.5px; font-weight:700; color:var(--g-hi); }
  .gsw .era-row { display:grid; grid-template-columns:84px 110px 1fr; gap:9px; align-items:start; padding:6px 0; border-top:1px solid var(--g-line); font-size:11.5px; }
  .gsw .era-co { font-weight:800; border-left:2px solid; padding-left:7px; }
  .gsw .era-tag { font-size:9.5px; font-weight:800; padding:2px 7px; border-radius:9px; text-align:center; height:fit-content; white-space:nowrap; }
  .gsw .era-text { color:var(--g-lo); line-height:1.55; }
  @media(max-width:760px){ .gsw .era-row{ grid-template-columns:1fr; gap:3px; } .gsw .era-tag{ justify-self:start; } }

  /* ============================================================
     EXPORT TRACKER (반도체 수출 트래커) — 관세청 TRASS 실데이터
     ============================================================ */
  .expv { color: var(--text); }
  .expv .hero-row {
    display:grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap:14px; margin-bottom:20px;
  }
  @media(max-width:1100px){ .expv .hero-row{ grid-template-columns:1fr 1fr; } }
  @media(max-width:600px){ .expv .hero-row{ grid-template-columns:1fr; } }
  .expv .hcard {
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px;

const COLORS = [
  '#2563eb','#16a34a','#dc2626','#d97706','#7c3aed',
  '#db2777','#0891b2','#65a30d','#ea580c','#9333ea',
  '#0284c7','#059669','#b91c1c','#b45309','#6d28d9'
];

function fmt(n, digits=0) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toLocaleString('ko-KR', {minimumFractionDigits: digits, maximumFractionDigits: digits});
}
function fmtPct(n, digits=1) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toFixed(digits) + '%';
}
function fmtChange(n, unit='') {
  if (n === null || n === undefined || isNaN(n)) return '-';
  const sign = n > 0 ? '+' : '';
  return sign + Number(n).toLocaleString('ko-KR') + unit;
}
function arrow(n) {
  if (!n || isNaN(n)) return '';
  return n > 0 ? '<span class="pos">▲</span>' : '<span class="neg">▼</span>';
}

// 범용 라인 차트 생성
function makeLineChart(canvasId, labels, datasets, opts={}) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: opts.ratio || false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.92)',
          titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          padding: 10, borderColor: '#334155', borderWidth: 1,
          callbacks: {
            label: function(ctx) {
              const v = ctx.raw;
              if (v === null || v === undefined) return ctx.dataset.label + ': -';
              const unit = opts.unit || '';
              return ctx.dataset.label + ': ' + Number(v).toLocaleString('ko-KR') + unit;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#6b7280', maxRotation: 45 }
        },
        y: {
          title: { display: !!opts.unit && opts.unit !== '%', text: (opts.unit && opts.unit !== '%') ? opts.unit : '', font: { size: 11 }, color: '#94a3b8' },
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: {
            font: { size: 11 }, color: '#6b7280',
            callback: function(v) {
              if (opts.unit === '%') return v + '%';
              return Number(v).toLocaleString('ko-KR', { maximumFractionDigits: 0 });
            }
          }
        },
        ...(opts.y2 ? {
          y1: {
            type: 'linear', position: 'right',
            grid: { drawOnChartArea: false },
            ticks: {
              font: { size: 11 }, color: '#6b7280',
              callback: v => v.toFixed(1) + '%'
            }
          }
        } : {})
      }
    }
  });
}

// 막대 차트 생성
function makeBarChart(canvasId, labels, datasets, opts={}) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: opts.showLegend || false, position: 'bottom', labels: { font: { size: 11 } } },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.92)',
          titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + Number(ctx.raw).toLocaleString('ko-KR') + (opts.unit || '')
          }
        }
      },
      scales: {
        x: {
          stacked: opts.stacked || false,
          grid: { display: false },
          ticks: { font: { size: 11 }, color: '#6b7280', maxRotation: 45 }
        },
        y: {
          stacked: opts.stacked || false,
          title: { display: !!opts.unit && opts.unit !== '%', text: (opts.unit && opts.unit !== '%') ? opts.unit : '', font: { size: 11 }, color: '#94a3b8' },
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: {
            font: { size: 11 }, color: '#6b7280',
            callback: function(v) {
              if (opts.unit === '%') return v + '%';
              return Number(v).toLocaleString('ko-KR', { maximumFractionDigits: 0 });
            }
          }
        }
      }
    }
  });
}

// 도넛 차트 생성
function makeDonutChart(canvasId, labels, data, colors) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.label + ': ' + ctx.raw.toFixed(1) + '%'
          }
        }
      },
      cutout: '60%'
    }
  });
}

// 범례 칩 렌더링
function renderLegend(containerId, datasets, chart) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  datasets.forEach((ds, i) => {
    const chip = document.createElement('span');
    chip.className = 'legend-chip';
    chip.style.borderColor = ds.borderColor || COLORS[i];
    chip.style.color = ds.borderColor || COLORS[i];
    chip.innerHTML = '<span class="dot" style="background:' + (ds.borderColor||COLORS[i]) + '"></span>' + ds.label;
    chip.addEventListener('click', () => {
      const meta = chart.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      chip.classList.toggle('hidden', meta.hidden);
      chart.update();
    });
    el.appendChild(chip);
  });
}

// 사이드바 모바일 토글
function initSidebar() {
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const closeBtn = document.getElementById('sidebarClose');
  if (menuBtn) menuBtn.addEventListener('click', () => {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  });
  if (overlay) overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
  if (closeBtn) closeBtn.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
}

// 엑셀 다운로드 (CSV 방식)
function downloadCsv(filename, headers, rows) {
  const BOM = '\uFEFF';
  const csv = BOM + [headers.join(','), ...rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','))].join('\r\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

let IS_SAMPLE = true;
function buildLiveData(records) {
  const quarters = [...new Set(records.map(r => r.quarter))].sort();
  const names = [...new Set(records.map(r => r.company))];
  const get = (name, q, f) => {
    const r = records.find(x => x.company === name && x.quarter === q);
    const v = r ? r[f] : null;
    return (v === null || v === undefined) ? 0 : v;
  };
  const SEG = { '종합반도체':'memory','메모리':'memory','파운드리':'foundry','소재/부품':'equipment','장비':'equipment' };
  const segOf = name => {
    const s = SEMI_SAMPLE.companies.find(c => c.name === name);
    if (s && s.segment) return s.segment;
    const r = records.find(x => x.company === name);
    return SEG[r && r.category] || 'memory';
  };
  const companies = names.map(name => ({
    name, segment: segOf(name),
    revenue: quarters.map(q => get(name, q, 'revenue')),
    opProfit: quarters.map(q => get(name, q, 'op_income')),
    opMargin: quarters.map(q => get(name, q, 'op_margin')),
    netProfit: quarters.map(q => get(name, q, 'net_income')),
    netMargin: quarters.map(q => get(name, q, 'net_margin')),
    opCashflow: quarters.map(q => get(name, q, 'op_cashflow')),
    eps: quarters.map(q => get(name, q, 'eps')),
    roe: quarters.map(q => get(name, q, 'roe')),
    capex: quarters.map(q => get(name, q, 'capex')),
    hbmRevenue: quarters.map(q => get(name, q, 'hbm_revenue')),
    inventory: quarters.map(q => get(name, q, 'inventory'))
  }));
  return { meta: { title: SEMI_SAMPLE.meta.title, quarters }, companies };
}
const __live = window.INDUSTRY_DATA_SEMICONDUCTOR;
const SEMI_DATA = (Array.isArray(__live) && __live.length)
  ? (IS_SAMPLE = false, buildLiveData(__live))
  : SEMI_SAMPLE;

    return [q, ...companies.map(c => c[currentMetric][ai] ?? '')];
  });
  downloadCsv('반도체_' + ml.label + '.csv', headers, rows);
}

(function(){

  const byId = Object.fromEntries(M.companies.map(c => [c.company_id, c]));

  const clamp = (x,a=-2,b=2)=>Math.max(a,Math.min(b,x));
  const round = (x,d=2)=>{const p=Math.pow(10,d);return Math.round(x*p)/p;};
  const num = n => (n==null||isNaN(n))?'-':Number(n).toLocaleString('en-US');
  const pp = (n,d=1)=> (n==null||isNaN(n))?'-':(n>0?'+':'')+Number(n).toFixed(d);
  const startIdx = ()=> QA.length - gswWin;
  const visQ = ()=> QA.slice(startIdx());

  function palette(){
    const light = document.body.classList.contains('gsw-light');
    return {
      hi: light?'#1A2332':'#E6ECF5', lo: light?'#5B6675':'#8A97AD',
      grid: light?'rgba(0,0,0,0.07)':'rgba(255,255,255,0.06)',
      green:'#22C55E', amber:'#F5B301', red:'#EF4444',
      a:'#2DD4BF', b:'#EF4444', c:'#FBBF24', est:'#A78BFA',
      tooltipBg: light?'rgba(20,28,46,0.95)':'rgba(3,7,18,0.95)'
    };
  }
  const GCOL = { samsung:'#60A5FA', skhynix:'#22C55E', micron:'#F59E0B', cxmt:'#A78BFA',
    wdc:'#94A3B8', ymtc:'#F472B6', tsmc:'#2DD4BF', intel:'#38BDF8',
    asml:'#FBBF24', amat:'#34D399', lrcx:'#F87171', klac:'#A3E635', entegris:'#C084FC' };
  const PHASE_COLOR = { Boom:'#22C55E', Recovery:'#F5B301', Trough:'#EF4444', Correction:'#EF4444' };

  // ---- cycle engine: norm rules + weights (the single, decomposable formula) ----
  const NORM = {
    mem_inventory_days: r => clamp((130 - r) / 20),
    mem_op_margin:      r => clamp((r - 5) / 17.5),
    contract_price_qoq: r => clamp(r / 5),
    equip_b2b:          r => clamp((r - 1.0) / 0.075),
    dram_big3_capex_qoq:r => clamp(r / 7.5),
  };
  const CW = { mem_inventory_days:.25, mem_op_margin:.30, contract_price_qoq:.20, equip_b2b:.15, dram_big3_capex_qoq:.10 };

  function phaseOf(c, prev){
    if (prev!=null && (c-prev)<=-0.10 && c<0.7) return 'Correction';
    if (c < -1.0) return 'Trough';
    if (c < 0.5)  return 'Recovery';
    return 'Boom';
  }
  function computeCycle(){
    const inds = M.cycle.indicators;
    const norm = {};
    inds.forEach(ind => { norm[ind.key] = ind.raw_series.map(r => r==null?0:round(NORM[ind.key](r),3)); });
    const composite = QA.map((q,i)=> round(inds.reduce((a,ind)=>a+CW[ind.key]*norm[ind.key][i],0),2));
    const phase = composite.map((c,i)=> phaseOf(c, i?composite[i-1]:null));
    return { inds, norm, composite, phase };
  }
  const CYC = computeCycle();
  // Reconcile embedded arrays with the live engine (single source of truth — avoid stale duplicates)
  M.cycle.composite_series = CYC.composite.slice();
  M.cycle.phase_series = CYC.phase.slice();
  M.cycle.indicators.forEach(ind => { ind.norm_series = CYC.norm[ind.key].slice(); });

  // ---- custom chart plugins (inline, scoped per chart) ----
  function phaseBandsPlugin(phases){
    return {
      id:'phaseBands',
      beforeDraw(chart){
        const {ctx, chartArea:ca, scales:{x}} = chart;
        if(!x||!ca) return;
        const n = phases.length;
        for(let i=0;i<n;i++){
          const cx = x.getPixelForValue(i);
          const prev = i>0 ? x.getPixelForValue(i-1) : cx;
          const next = i<n-1 ? x.getPixelForValue(i+1) : cx;
          const left = i===0 ? ca.left : (prev+cx)/2;
          const right = i===n-1 ? ca.right : (cx+next)/2;
          ctx.save();
          ctx.fillStyle = (PHASE_COLOR[phases[i]]||'#888') + '22';
          ctx.fillRect(left, ca.top, right-left, ca.bottom-ca.top);
          ctx.restore();
        }
      }
    };
  }
  function thresholdPlugin(lines){
    return { id:'thr', afterDraw(chart){
      const {ctx, chartArea:ca, scales:{y}} = chart; if(!y) return;
      lines.forEach(L=>{
        const py = y.getPixelForValue(L.y); if(py<ca.top||py>ca.bottom) return;
        ctx.save(); ctx.setLineDash([5,4]); ctx.strokeStyle=L.color; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(ca.left,py); ctx.lineTo(ca.right,py); ctx.stroke();
        ctx.setLineDash([]); ctx.fillStyle=L.color; ctx.font='10px Segoe UI';
        ctx.fillText(L.label, ca.left+4, py-3); ctx.restore();
      });
    }};
  }
  function gaugeCenterPlugin(value, zoneColor){
    return { id:'gc', afterDraw(chart){

      ctx.fillStyle=zoneColor; ctx.font='800 30px Segoe UI'; ctx.fillText(value, cx, cy-4);
      ctx.fillStyle=P.lo; ctx.font='10px Segoe UI'; ctx.fillText('/ 100', cx, cy+11);
      ctx.restore();
    }};
  }

  // ---- chart factory (dark/light theme-aware) ----
  function baseScales(P, opts){
    const s = {
      x:{ grid:{color:P.grid}, ticks:{color:P.lo, font:{size:10}, maxRotation:0} },

           callback:v=> (opts.unit==='%'? v+'%' : Number(v).toLocaleString('en-US')) },
          title:{display:!!opts.yTitle, text:opts.yTitle||'', color:P.lo, font:{size:10}} }

    if(opts.yMin!=null) s.y.min=opts.yMin; if(opts.yMax!=null) s.y.max=opts.yMax;
    if(opts.dual){

        title:{display:!!opts.dual.title, text:opts.dual.title||'', color:P.lo, font:{size:10}} };
    }
    return s;
  }
  function lineChart(cid, labels, datasets, opts={}){
    const P=palette();

            <div class="sub-panel"><div class="sp-title">AI 수요 모멘텀 지수 <span class="sp-hint">0–100 가중복합 · 28→${aiNow}</span></div><div class="chart-box sm"><canvas id="gMom"></canvas></div></div>
            <div class="sub-panel"><div class="sp-title">모멘텀 구간별 HBM 포지션 가중치</div><table><thead><tr><th>지수 구간</th><th>국면</th><th>SK하이닉스</th><th>마이크론</th><th>운용</th></tr></thead><tbody id="gPos"></tbody></table></div>
          </div>
          <div class="sub-panel" style="margin-top:14px"><div class="sp-title">선행지표 체계 (Lead / Weight)</div><table><thead><tr><th>지표</th><th>Lead</th><th>Weight</th></tr></thead><tbody id="gLead"></tbody></table></div>
        </div>
      </div>

      <!-- MODULE D -->
      <div class="mod" id="modD" style="--mc:#FBBC04">
        <div class="mod-head"><span class="mtag">MODULE D</span><h3>파운드리 노드 진화 &amp; 산업사 (2010–2026)</h3><span class="mhint">선단공정 리더십 이동 · 범례 클릭=토글 · 점 hover=마일스톤</span><span class="chev">▾</span></div>
        <div class="mod-body">
          <div class="sub-panel"><div class="sp-title">Foundry Node Evolution <span class="sp-hint">Y축 역축 — 작을수록 선단(위로)</span></div><div class="chart-box foundry"><canvas id="gFoundry"></canvas></div></div>
          <div id="gEras" style="margin-top:14px"></div>
        </div>
      </div>

      <!-- LEVEL 3 -->
      <div class="mod collapsed" id="modT" style="--mc:var(--g-lo)">
        <div class="mod-head"><span class="mtag">LEVEL 3</span><h3>기업 상세 테이블 (2025Q4 스냅샷)</h3><span class="mhint">13개사 · 추정행 점선 · CSV</span><span class="chev">▾</span></div>
        <div class="mod-body">
          <div style="margin-bottom:8px"><button class="csv-btn" id="gCsv">⬇ CSV</button></div>
          <div style="overflow-x:auto"><table><thead><tr><th>기업</th><th>티커</th><th>매출($mn)</th><th>OPM%</th><th>재고일</th><th>점유율%</th><th>HBM매출%</th><th>b2b</th><th>신뢰</th></tr></thead><tbody id="gTbl"></tbody></table></div>
        </div>
      </div>
      <div class="mod collapsed" id="modM" style="--mc:var(--est)">
        <div class="mod-head"><span class="mtag">근거</span><h3>비상장 추정 방법론 노트</h3><span class="mhint">CXMT / YMTC · 4-Tier 역산</span><span class="chev">▾</span></div>
        <div class="mod-body" id="gMethod"></div>
      </div>
    </div>
    <div class="gsw-modal" id="gswModal"><div class="mbox"><button class="mclose" id="gModalClose">✕</button><div id="gModalBody"></div></div></div>
    `;

    // ---------- LEVEL 1 gauge ----------
    charts.gsw_gauge = gaugeChart('gGauge', aiNow);

    // ---------- MODULE A ----------
    // dual axis: OPM (left) + inventory days (right, reversed) + phase bands
    const memOpm = QA.map((q,i)=> round(big3.reduce((a,id)=>a+byId[id].series.op_margin_pct[i],0)/3,1));
    const memInv = QA.map((q,i)=> round(big3.reduce((a,id)=>a+byId[id].series.inventory_days[i],0)/3,1));
    charts.gsw_dual = lineChart('gDual', Q, [
      { label:'메모리3사 평균 OPM', data:memOpm.slice(sIdx), borderColor:P.green, backgroundColor:P.green+'22', tension:.35, borderWidth:2.6, pointRadius:3, yAxisID:'y' },
      { label:'평균 재고일수(역축)', data:memInv.slice(sIdx), borderColor:P.amber, backgroundColor:'transparent', borderDash:[6,4], tension:.35, borderWidth:2, pointRadius:2.5, yAxisID:'y1' },
    ], { unit:'%', yTitle:'영업이익률 %', dual:{reverse:true, unit:'일', title:'재고일수(역축)'}, phases:cyc.phase.slice(sIdx) });

    // radar: current vs prev norms
    const axes=['재고','OPM','가격QoQ','b2b','CAPEX QoQ'];
    const order=['mem_inventory_days','mem_op_margin','contract_price_qoq','equip_b2b','dram_big3_capex_qoq'];
    charts.gsw_radar = radarChart('gRadar', axes, [
      { label:'2025Q4', data:order.map(k=>cyc.norm[k][cur]), color:P.a },
      { label:'2025Q3', data:order.map(k=>cyc.norm[k][cur-1]), color:P.lo, dash:[5,4] },
    ]);

    // composite line + thresholds + click decomposition
    charts.gsw_comp = lineChart('gComp', Q, [
      { label:'Composite', data:cyc.composite.slice(sIdx), borderColor:P.a, backgroundColor:P.a+'22', tension:.3, borderWidth:2.6, pointRadius:4, fill:true }
    ], { yMin:-2, yMax:2, phases:cyc.phase.slice(sIdx),
         thresholds:[{y:0.5,color:P.green,label:'+0.5 Boom'},{y:-1.0,color:P.red,label:'−1.0 Trough'}],
         tip:{ label(c){ const ai=sIdx+c.dataIndex; return 'Composite '+pp(cyc.composite[ai],2)+' · '+cyc.phase[ai]; } },
         onClick(evt){ const el=charts.gsw_comp.getElementsAtEventForMode(evt,'nearest',{intersect:false},true); if(el.length){ openDecomp(sIdx+el[0].index); } } });

    // backtest strip
    const bt=M.backtest;
    document.getElementById('gBT').innerHTML =
      '<div class="bt-strip">'+bt.periods.map((p,i)=>{ const ok=bt.actual_phase[i]===bt.predicted_phase[i];
        return '<div class="bt-cell '+(ok?'bt-ok':'bt-no')+'" title="'+p+' · 실제 '+bt.actual_phase[i]+' / 예측 '+bt.predicted_phase[i]+'">'+(ok?'✓':'✗')+'</div>'; }).join('')+'</div>'+
      '<div class="bt-strip" style="margin-top:2px">'+bt.periods.map(p=>'<div class="bt-lab" style="flex:1">'+p.replace('20','').replace('H','H')+'</div>').join('')+'</div>';

    // signal table
    document.getElementById('gSig').innerHTML = M.cycle.signal_map.map(s=>{
      const cls = /Short/.test(s.signal)?'short':(/Neutral/.test(s.signal)&&!/Long/.test(s.signal)?'neutral':'long');
      return '<tr><td>'+s.range+'</td><td>'+s.phase+'</td><td style="text-align:left"><span class="sig '+cls+'">'+s.signal+'</span></td><td style="text-align:left;white-space:normal;color:var(--g-lo)">'+s.note+'</td></tr>';
    }).join('');

    // ---------- MODULE B ----------
    const bub = M.threat.bubble.map(p=>{ const co=byId[p.company_id];
      return { id:p.company_id, label:co.name_ko, x:p.x_share, y:p.y_delta, r:Math.max(8,Math.sqrt(p.size_capex)/8), capex:p.size_capex, est:co.data_reliability==='estimated' }; });
    charts.gsw_bubble = bubbleChart('gBubble', bub);

    // heatmap
    const cats=M.threat.categories;
    const heatRows=M.threat.heatmap;
    const heatEl=document.getElementById('gHeat');
    heatEl.style.gridTemplateColumns='90px repeat('+cats.length+',1fr)';
    let hh='<div class="hl-lbl"></div>'+cats.map(c=>'<div class="hl-col">'+c+'</div>').join('');
    heatRows.forEach(r=>{ const co=byId[r.company_id];
      hh+='<div class="hl-lbl">'+co.name_ko+(co.data_reliability==='estimated'?' <span class="badge est">Est</span>':'')+'</div>';
      cats.forEach(c=>{ const v=r.scores[c]; hh+='<div class="hc" style="background:'+heatColor(v)+'">'+v+'</div>'; });
    });
    heatEl.innerHTML=hh;

    // node timeline
    document.getElementById('gTL').innerHTML = [
      {lab:'선두 DRAM', node:'1b(12nm) → 1c ramp · HBM3E 12Hi', pct:100, gap:'기준선', col:P.green},
      {lab:'CXMT DRAM', node:'17nm/G4 · DDR4 + DDR5초기 · EUV 미보유', pct:42, gap:'4–5년', col:P.est},
      {lab:'선두 NAND', node:'218–238L · BiCS8/V8', pct:100, gap:'기준선', col:P.green},
      {lab:'YMTC NAND', node:'Xtacking 3.0 232L · 제재', pct:62, gap:'장비제약', col:P.est},
    ].map(t=>'<div class="tl-row"><div class="tl-lab">'+t.lab+'</div><div><div style="color:var(--g-lo);font-size:10.5px;margin-bottom:3px">'+t.node+'</div><div class="tl-bar"><span style="width:'+t.pct+'%;background:'+t.col+'"></span></div></div><div class="tl-gap">'+t.gap+'</div></div>').join('');

    // asp sensitivity
    document.getElementById('gAsp').innerHTML = M.threat.asp_sensitivity.map(r=>{
      const near = Math.abs(r.cxmt_share_pct-cxShareNow)<=1 || (r.cxmt_share_pct===10);
      const sig = r.cxmt_share_pct>=13?'short':(r.cxmt_share_pct>=10?'short':(r.cxmt_share_pct>=8?'neutral':'long'));
      const lab = r.cxmt_share_pct>=16?'사이클 훼손':r.cxmt_share_pct>=13?'Short 강화':r.cxmt_share_pct>=10?'⚠ Short 트리거':r.cxmt_share_pct>=8?'Watch':'Neutral';
      return '<tr class="'+(near?'hl':'')+'"><td>'+r.cxmt_share_pct+'%</td><td>'+r.dram_asp_delta_pct+'%</td><td class="dn">'+pp(r.hynix_opmargin_delta_pp)+'pp</td><td class="dn">'+pp(r.micron_opmargin_delta_pp)+'pp</td><td style="text-align:left"><span class="sig '+sig+'">'+lab+'</span></td></tr>';
    }).join('');

    // ---------- MODULE C ----------
    const eqIds=['asml','amat','lrcx','klac'];
    const b2bDs = eqIds.map(id=>({ label:byId[id].name_en, data:byId[id].series.book_to_bill.slice(sIdx),
      borderColor:GCOL[id], backgroundColor:GCOL[id]+'18', tension:.3, borderWidth:2, pointRadius:2.5, yAxisID:'y' }));
    b2bDs.push({ label:'ASML backlog', type:'bar', data:byId.asml.series.order_backlog_usd_mn.slice(sIdx),
      backgroundColor:P.amber+'33', borderColor:P.amber+'55', yAxisID:'y1', order:9 });
    charts.gsw_b2b = lineChart('gB2B', Q, b2bDs, { yTitle:'book-to-bill', yMin:0.8, yMax:1.35,
      dual:{unit:'k', title:'backlog $mn'}, thresholds:[{y:1.0,color:P.lo,label:'1.0 균형'}] });
    charts.gsw_b2b.options.scales.y1.ticks.callback=v=>Math.round(v/1000)+'k';
    charts.gsw_b2b.update();
    legendChips('gB2BLeg', charts.gsw_b2b, eqIds.map(id=>({label:byId[id].name_en.split(' ')[0],color:GCOL[id]})).concat([{label:'ASML backlog',color:P.amber}]));

    const hbmIds=['skhynix','micron'];
    const hbmDs=hbmIds.map(id=>({ label:byId[id].name_ko, data:byId[id].series.hbm_related_revenue_share_pct.slice(sIdx),
      borderColor:GCOL[id], backgroundColor:GCOL[id]+'22', tension:.35, borderWidth:2.6, pointRadius:3, fill:true }));
    charts.gsw_hbm = lineChart('gHBM', Q, hbmDs, { unit:'%', yTitle:'HBM 매출비중 %', tip: relTip(i=>byId[hbmIds[i]], '%') });
    legendChips('gHBMLeg', charts.gsw_hbm, hbmIds.map(id=>({label:byId[id].name_ko,color:GCOL[id]})));

    charts.gsw_mom = lineChart('gMom', Q, [
      { label:'AI 모멘텀', data:M.aiMomentum.index_series.slice(sIdx), borderColor:P.c, backgroundColor:P.c+'22', tension:.35, borderWidth:2.6, pointRadius:3.5, fill:true }
    ], { yMin:0, yMax:100, thresholds:[{y:50,color:P.lo,label:'50 중립'},{y:80,color:P.red,label:'80 피크'}] });

    // position weight guide
    document.getElementById('gPos').innerHTML = [
      ['< 40','회복초입','60%','40%','바닥매집·하이닉스 집중'],
      ['40–60','확장','55%','45%','풀포지션 구축'],
      ['60–70','중립상회','50%','50%','동등·마이크론 캐치업'],
      ['70–80','강세확장','45%','55%','트림 대비'],
      ['≥ 80','피크 (현재 '+aiNow+')','40%','40%+현금20%','차익실현·CXMT 숏 헤지'],
    ].map(r=>{ const hot=r[0]==='≥ 80'; return '<tr class="'+(hot?'hl':'')+'"><td>'+r[0]+'</td><td>'+r[1]+'</td><td>'+r[2]+'</td><td>'+r[3]+'</td><td style="text-align:left;white-space:normal;color:var(--g-lo)">'+r[4]+'</td></tr>'; }).join('');

    // lead table
    document.getElementById('gLead').innerHTML = M.aiMomentum.indicators.map(i=>{
      const c = i.lead==='T-2'?'var(--acc-c)':i.lead==='T-1'?'var(--acc-a)':'var(--g-lo)';
      return '<tr><td style="text-align:left">'+i.label+'</td><td><span class="sig" style="background:'+c+'22;color:'+c+'">'+i.lead+'</span></td><td>'+i.weight.toFixed(2)+'</td></tr>';
    }).join('');

    // ---------- MODULE D ----------
    charts.gsw_foundry = foundryChart('gFoundry', FOUNDRY);
    document.getElementById('gEras').innerHTML = ERAS.map(e=>
      '<div class="era" style="--era-c:'+e.color+'"><div class="era-head"><span class="era-period">'+e.period+'</span><span class="era-title">'+e.title+'</span></div>'+
      e.rows.map(r=>'<div class="era-row"><span class="era-co" style="border-color:'+r.color+';color:'+r.color+'">'+r.co+'</span><span class="era-tag" style="background:'+r.color+'22;color:'+r.color+'">'+r.tag+'</span><span class="era-text">'+r.text+'</span></div>').join('')+
      '</div>').join('');

    // ---------- LEVEL 3 table ----------
    renderCompanyTable();
    document.getElementById('gMethod').innerHTML = M.companies.filter(c=>c.estimation_methodology).map(c=>{
      const m=c.estimation_methodology;
      return '<div class="note" style="margin-bottom:12px"><b>'+c.name_ko+' ('+c.name_en+')</b> · conf '+c.confidence_level+' · 오차밴드 ±'+m.error_band_pct+'%<br>'+m.basis+'<br>'+m.sources.map(s=>'<span class="src-pill">'+s.replace('https://','').replace(/\/$/,'')+'</span>').join('')+'</div>';
    }).join('') + '<div class="note"><b>4-Tier 역산</b> — Primary(모기업 IR·채권공시) → Secondary(중국세관 HS854232·SEMI통계) → Tertiary(채널체크·웨이퍼 출하 역산 = bit output × ASP) → 교차검증(TrendForce·Omdia·IDC 삼각측량). 추정 매출 = capa(wpm) × 가동률 × bit density × 수율 × 블렌디드 ASP.</div>';

    // ---------- interactions ----------
    document.querySelectorAll('#gswWinCtl button').forEach(b=>{ b.classList.toggle('active', +b.dataset.win===gswWin);
      b.addEventListener('click',()=>{ gswWin=+b.dataset.win; renderGswView(main); }); });
    document.getElementById('gswTheme').addEventListener('click',()=>{ document.body.classList.toggle('gsw-light'); renderGswView(main); });
    document.querySelectorAll('.gsw .mod-head').forEach(h=> h.addEventListener('click',()=> h.parentElement.classList.toggle('collapsed')));
    document.getElementById('compHero').addEventListener('click',()=>openDecomp(cur));
    document.getElementById('gCsv').addEventListener('click', exportGsw);
    const modal=document.getElementById('gswModal');
    document.getElementById('gModalClose').addEventListener('click',()=>modal.classList.remove('open'));
    modal.addEventListener('click',e=>{ if(e.target===modal) modal.classList.remove('open'); });
  };

  function heatColor(v){ // 0 red → 50 amber → 100 green
    const g = v>=50 ? [Math.round(245-(v-50)/50*(245-34)), Math.round(179+(v-50)/50*(197-179)), Math.round(1+(v-50)/50*(94-1))]
                    : [239, Math.round(68+v/50*(179-68)), Math.round(68-v/50*68+1)];
    return 'rgb('+g[0]+','+g[1]+','+g[2]+')';
  }

  function renderCompanyTable(){
    const cur=QA.length-1;
    const groups=[['DRAM·NAND 메모리',['samsung','skhynix','micron','cxmt','wdc','ymtc']],['Foundry·Logic',['tsmc','intel']],['Equipment',['asml','amat','lrcx','klac']],['Materials',['entegris']]];
    let h='';
    groups.forEach(([g,ids])=>{
      h+='<tr class="grp"><td colspan="9">'+g+'</td></tr>';
      ids.forEach(id=>{ const c=byId[id], s=c.series; const est=c.data_reliability==='estimated';
        const cdot = c.confidence_level>=5?'#22C55E':c.confidence_level>=3?'#F5B301':'#A78BFA';
        const title = est?('추정 · conf '+c.confidence_level+' · ±'+c.estimation_methodology.error_band_pct+'% · '+c.estimation_methodology.sources[0].replace('https://','')):('감사공시 · conf '+c.confidence_level);
        h+='<tr class="'+(est?'est-row':'')+'" title="'+title+'"><td>'+c.name_ko+' '+(est?'<span class="badge est">Est</span>':'<span class="badge aud">Aud</span>')+'</td><td style="color:var(--g-lo)">'+c.ticker+'</td>'+
          '<td>'+num(s.revenue_usd_mn[cur])+'</td><td>'+(s.op_margin_pct[cur]==null?'-':s.op_margin_pct[cur]+'%')+'</td>'+
          '<td>'+(s.inventory_days[cur]==null?'-':s.inventory_days[cur])+'</td><td>'+(c.market_share_pct==null?'-':c.market_share_pct+'%')+'</td>'+
          '<td>'+(s.hbm_related_revenue_share_pct[cur]==null?'-':s.hbm_related_revenue_share_pct[cur]+'%')+'</td>'+
          '<td>'+(s.book_to_bill[cur]==null?'-':s.book_to_bill[cur])+'</td>'+
          '<td>'+c.confidence_level+'<span class="conf-dot" style="background:'+cdot+'"></span></td></tr>';
      });
    });
    document.getElementById('gTbl').innerHTML=h;
  }

  function openDecomp(idx){
    if(idx==null || idx<0 || idx>=QA.length) return;
    const cyc=CYC; const P=palette();
    const labels={mem_inventory_days:'재고일수',mem_op_margin:'영업이익률',contract_price_qoq:'고정가격 QoQ',equip_b2b:'장비 b2b',dram_big3_capex_qoq:'CAPEX QoQ'};
    const rows=cyc.inds.map(ind=>{ const n=cyc.norm[ind.key][idx]; const contrib=round(CW[ind.key]*n,3);
      return {key:ind.key, label:labels[ind.key], w:CW[ind.key], norm:n, raw:ind.raw_series[idx], contrib}; });
    const total=round(rows.reduce((a,r)=>a+r.contrib,0),2);
    const maxAbs=Math.max(...rows.map(r=>Math.abs(r.contrib)),0.5);
    const body=document.getElementById('gModalBody');
    body.innerHTML='<h3>사이클 점수 분해 · '+QA[idx]+'</h3><div style="color:'+P.lo+';font-size:11px;margin-bottom:12px">composite = Σ wᵢ × normᵢ = <b style="color:'+P.a+'">'+pp(total,2)+'</b> → '+cyc.phase[idx]+'</div>'+
      rows.map(r=>{ const pos=r.contrib>=0; const w=Math.abs(r.contrib)/maxAbs*50;
        return '<div class="wf-row"><div>'+r.label+' <span style="color:'+P.lo+';font-size:10px">(w '+r.w+' × '+r.norm.toFixed(2)+')</span></div>'+
          '<div class="wf-bar"><span style="'+(pos?'left:50%':'right:50%')+';width:'+w+'%;background:'+(pos?P.green:P.red)+'"></span><span style="left:50%;width:1px;background:'+P.lo+'"></span></div>'+
          '<div style="text-align:right;color:'+(pos?P.green:P.red)+';font-weight:700">'+pp(r.contrib,2)+'</div></div>'; }).join('')+
      '<div class="note" style="margin-top:10px">raw 입력: '+rows.map(r=>r.label+' '+r.raw).join(' · ')+'</div>';
    document.getElementById('gswModal').classList.add('open');
  }

  function exportGsw(){
    const cur=QA.length-1;
    const headers=['기업','티커','세그먼트','매출_USDmn','OPM_%','재고일','점유율_%','HBM매출_%','b2b','신뢰도','데이터'];
    const rows=M.companies.map(c=>{ const s=c.series; return [c.name_ko,c.ticker,c.segment.join('/'),s.revenue_usd_mn[cur],s.op_margin_pct[cur],s.inventory_days[cur]??'',c.market_share_pct??'',s.hbm_related_revenue_share_pct[cur]??'',s.book_to_bill[cur]??'',c.confidence_level,c.data_reliability]; });
    downloadCsv('GlobalSemiWatch_2025Q4.csv', headers, rows);
  }

  // attach nav handler
  document.querySelectorAll('#gswNav button').forEach(btn=>{
    btn.addEventListener('click',()=>{ currentView='gsw';
      document.querySelectorAll('#summaryNav button, #companyNav button, #gswNav button, #exportNav button, #predNav button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); renderView(); });
  });
})();

function setExportChrome() {

  if (controls) controls.style.display = 'none';
  const h1 = document.querySelector('header h1');
  const sub = document.querySelector('header .sub');
  const lm = (window.SEMI_EXPORT_DATA && SEMI_EXPORT_DATA.meta.latest_month) || '';
  h1.textContent = '반도체 수출 트래커';

// 모멘텀 → 롱/숏 시그널
function expSig(yoy, mom) {
  if (yoy == null) return { t: '데이터 부족', c: 'neutral' };
  if (yoy >= 15 && (mom == null || mom > -8)) return { t: '롱 우호', c: 'long' };
  if (yoy <= -15 || (yoy < 0 && mom != null && mom < -10)) return { t: '숏 우호', c: 'short' };
  return { t: '중립', c: 'neutral' };
}
function expArrow(v, digits=1, unit='%') {
  if (v == null || isNaN(v)) return '<span class="sub2">n/a</span>';
  const cls = v >= 0 ? 'up' : 'dn';
  const sym = v >= 0 ? '▲' : '▼';
  return '<span class="' + cls + '">' + sym + ' ' + Math.abs(v).toFixed(digits) + unit + '</span>';
}
function lastNonNull(arr) {
  for (let i = arr.length - 1; i >= 0; i--) if (arr[i] != null) return arr[i];
  return null;
}
function fmtMusd(v) {
  if (v == null) return '-';
  if (Math.abs(v) >= 1000) return (v / 1000).toLocaleString('ko-KR', { maximumFractionDigits: 2 }) + ' B';
  return Number(v).toLocaleString('ko-KR', { maximumFractionDigits: 0 }) + ' M';
}

// 수출 트래커 CSV 내보내기 (제품 믹스 시계열)
function exportExportCsv() {
  const D = window.SEMI_EXPORT_DATA;
  if (!D) return;
  const headers = ['월', '총수출_M$', '총YoY_%', '총MoM_%', 'DRAM_M$', 'NAND_M$', 'HBM_M$', 'DRAM_ASP지수', 'HBM_M$_YoY'];
  const dram = D.product['DRAM'], nand = D.product['NAND Flash'], hbm = D.product['HBM/Advanced (복합구조칩)'];
  const dramI = D.asp_index['DRAM'] ? D.asp_index['DRAM'].idx : [];
  const rows = D.labels.map((m, i) => [m, D.total.musd[i], D.total.yoy[i], D.total.mom[i],
    dram.musd[i], nand.musd[i], hbm.musd[i], dramI[i], D.hbm.yoy[i]]);
  let csv = '﻿' + headers.join(',') + '\n' + rows.map(r => r.map(v => v == null ? '' : v).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '반도체수출트래커_' + D.meta.latest_month + '.csv';
  a.click();
}

const SIDE_KR = { pos: '호재', neg: '악재', neu: '중립' };
function mLabelKr(m) { const p = m.split('-'); return p[0] + '년 ' + (+p[1]) + '월'; }

function renderPredView(main) {
  const D = window.SEMI_EXPERTS;
  if (!D) {
    main.innerHTML = '<div class="panel"><div class="panel-title">데이터 없음</div>' +
      '<div class="note">data/semi_experts.js 파일이 없습니다. build_experts.py 를 실행해 생성하세요.</div></div>';
    return;
  }
  const M = D.months, lai = D.last_actual_idx;
  // 손으로 추가한 항목 보정: x/y 좌표가 없으면 horizon/month 로 자동 계산
  D.events.forEach(e => {
    if (e.x == null) e.x = M.indexOf(e.month);
    if (e.y == null) e.y = e.future ? D.scenarios.base.data[e.x] : D.kospi[e.x];
  });
  D.experts.forEach(e => {
    if (e.x == null) { const i = M.indexOf(e.horizon); e.x = i >= 0 ? i : null; }  // TBD/미정 → null (마커 없음)
    if (e.x != null && e.y == null) { const scn = D.scenarios[e.side]; e.y = (scn && scn.data[e.x] != null) ? scn.data[e.x] : D.kospi[lai]; }
  });
  const bulls = D.experts.filter(e => e.side === 'bull');
  const bears = D.experts.filter(e => e.side === 'bear');
  const nB = bulls.length, nR = bears.length, tot = nB + nR;
  const bullPct = tot ? Math.round(nB / tot * 100) : 50;
  const net = nB > nR ? '강세 우위' : nR > nB ? '약세 우위' : '중립';
  const netCls = nB > nR ? 'bull' : nR > nB ? 'bear' : 'neu';

  // 다음 분기점 = 가장 가까운 미래 전문가 콜
  const future = D.experts.filter(e => e.x >= lai).sort((a, b) => a.x - b.x);
  const nx = future[0];

  main.innerHTML = `
  <div class="pv">
    <div class="consensus">
      <div class="ccard">
        <div class="cap">전문가 컨센서스 (불 vs 베어)</div>
        <div class="bbbar">
          <div class="bull" style="width:${bullPct}%">BULL ${nB}</div>
          <div class="bear" style="width:${100 - bullPct}%">BEAR ${nR}</div>
        </div>
        <div class="net">순포지션: <span class="${netCls === 'bull' ? 'pos' : netCls === 'bear' ? 'neg' : ''}">${net}</span></div>
      </div>
      <div class="ccard">
        <div class="cap">KOSPI 시나리오 (2027년말)</div>
        <div style="display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:700;margin-top:2px">
          <div><span class="pos">▲ 불</span> ${D.scenarios.bull.end.toLocaleString()}</div>
          <div style="color:var(--muted)">― 베이스 ${D.scenarios.base.end.toLocaleString()}</div>
          <div><span class="neg">▼ 베어</span> ${D.scenarios.bear.end.toLocaleString()}</div>
        </div>
      </div>
      <div class="ccard">
        <div class="cap">⚑ 다음 분기점 (가장 가까운 전망)</div>
        ${nx ? `<div class="next-cat">
          <div class="big">${nx.horizon_lbl} · <span class="${nx.side === 'bull' ? 'pos' : 'neg'}">${nx.call}</span></div>
          <div class="who">${nx.name} (${nx.org})</div>
          <div class="why">${nx.thesis}</div>
        </div>` : '<div class="next-cat"><div class="who">예정된 전망 없음</div></div>'}
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">KOSPI 사이클 & 반도체 캐털리스트 타임라인
        <span class="panel-hint">점(●) 클릭 = 이벤트 설명 · 삼각형(▲▼) 클릭 = 전문가 콜</span></div>
      <div class="chart-inner-p"><canvas id="predChart"></canvas></div>
      <div class="chip-row">
        <span class="ev-chip"><span class="d" style="background:#16a34a"></span>호재</span>
        <span class="ev-chip"><span class="d" style="background:#dc2626"></span>악재</span>
        <span class="ev-chip"><span class="d" style="background:#f59e0b"></span>중립</span>
        <span class="ev-chip"><span class="d" style="background:#fff;border:1px solid #94a3b8"></span>미래 캐털리스트(관전)</span>
        <span class="ev-chip">▲ 불 콜 &nbsp; ▼ 베어 콜</span>
      </div>
      <div class="legend-note">실선=KOSPI 실측(${mLabelKr(D.meta.last_actual)}까지) · 점선=불/베이스/베어 시나리오. ${D.meta.note}</div>
    </div>

    <div class="ledger">
      <div>
        <div class="lcol-head bull">🐂 BULLS <span class="cnt">${nB}명</span></div>
        <div id="bullCards"></div>
      </div>
      <div>
        <div class="lcol-head bear">🐻 BEARS <span class="cnt">${nR}명</span></div>
        <div id="bearCards"></div>
      </div>
    </div>
    <div class="editbar">✎ <b>레저는 살아있는 문서입니다.</b> 전문가·발언·KOSPI 실측치는 <b>build_experts.py</b> 의 <code>experts</code>/<code>kospi_v</code> 를 고쳐 <code>python build_experts.py</code> 재실행으로 갱신하세요.
      출처에 <span style="color:#b45309">[확인필요]</span>가 붙은 항목은 실제 리포트로 교체 권장. 시점 미정(TBD) 전망은 차트 마커 없이 카드에만 표시됩니다. KOSPI 2025~2026은 추정치입니다.</div>

    <div class="pv-modal" id="pvModal"><div class="box" id="pvBox"></div></div>
  </div>`;

  // ===== 차트 (마커는 {x,y} 객체 데이터 → 같은 달에 여러 마커도 충돌 없이 표시) =====
  const evData = D.events.map(e => ({ x: M[e.x], y: e.y }));
  const evColor = D.events.map(e => e.future ? '#ffffff' : SIDE_COLOR[e.side]);
  const evBorder = D.events.map(e => e.future ? '#94a3b8' : '#ffffff');
  const exMarkers = D.experts.filter(e => e.x != null);  // 시점 있는 전망만 차트 마커
  const exData = exMarkers.map(e => ({ x: M[e.x], y: e.y }));
  const exColor = exMarkers.map(e => e.side === 'bull' ? '#16a34a' : '#dc2626');
  const exRot = exMarkers.map(e => e.side === 'bull' ? 0 : 180);  // 불=▲, 베어=▼

  const DS_KOSPI = 0, DS_BULL = 1, DS_BASE = 2, DS_BEAR = 3, DS_EV = 4, DS_EX = 5;
  charts.pred = new Chart(document.getElementById('predChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: M,
      datasets: [
        { label: 'KOSPI', data: D.kospi, borderColor: '#1f2a44', backgroundColor: '#1f2a4410',
          borderWidth: 2.4, pointRadius: 0, tension: 0.2, spanGaps: false, fill: true, order: 5 },
        { label: '불 시나리오', data: D.scenarios.bull.data, borderColor: '#16a34a', borderDash: [5, 4],
          borderWidth: 1.8, pointRadius: 0, tension: 0.25, spanGaps: true, order: 6 },
        { label: '베이스', data: D.scenarios.base.data, borderColor: '#94a3b8', borderDash: [3, 3],
          borderWidth: 1.5, pointRadius: 0, tension: 0.25, spanGaps: true, order: 6 },
        { label: '베어 시나리오', data: D.scenarios.bear.data, borderColor: '#dc2626', borderDash: [5, 4],
          borderWidth: 1.8, pointRadius: 0, tension: 0.25, spanGaps: true, order: 6 },
        { label: '이벤트', showLine: false, data: evData, pointBackgroundColor: evColor, pointBorderColor: evBorder,
          pointBorderWidth: 1.5, pointRadius: 6, pointHoverRadius: 9, order: 1 },
        { label: '전문가 콜', showLine: false, data: exData, pointStyle: 'triangle', rotation: exRot,
          pointBackgroundColor: exColor, pointBorderColor: '#ffffff', pointBorderWidth: 1.5, pointRadius: 11, pointHoverRadius: 14, order: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: true },
      onClick: (evt, els) => {
        if (!els || !els.length) return;
        for (const el of els) {
          if (el.datasetIndex === DS_EV && D.events[el.index]) { openEvModal(D.events[el.index]); return; }
          if (el.datasetIndex === DS_EX && exMarkers[el.index]) { openExModal(exMarkers[el.index]); return; }
        }
      },
      onHover: (evt, els) => { evt.native.target.style.cursor = (els && els.length && (els[0].datasetIndex === DS_EV || els[0].datasetIndex === DS_EX)) ? 'pointer' : 'default'; },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.94)', titleColor: '#cbd5e1', bodyColor: '#f1f5f9',
          padding: 10, borderColor: '#334155', borderWidth: 1, displayColors: false,
          callbacks: {
            title: items => { const it = items[0]; if (it.datasetIndex === DS_EV) return mLabelKr(D.events[it.dataIndex].month); if (it.datasetIndex === DS_EX) return mLabelKr(exMarkers[it.dataIndex].horizon); return mLabelKr(M[it.dataIndex]); },
            label: (ctx) => {
              const di = ctx.datasetIndex, ix = ctx.dataIndex;
              if (di === DS_EV) { const e = D.events[ix]; return e ? '● ' + e.title + ' (' + SIDE_KR[e.side] + ', 클릭)' : null; }
              if (di === DS_EX) { const e = exMarkers[ix]; return e ? (e.side === 'bull' ? '▲ ' : '▼ ') + e.name + ': ' + e.call + ' (클릭)' : null; }
              if (di === DS_KOSPI) return ctx.raw == null ? null : 'KOSPI ' + Number(ctx.raw).toLocaleString();
              return ctx.dataset.label + ' ' + (ctx.raw == null ? '' : Number(ctx.raw).toLocaleString());
            }
          }
        }
      },
      scales: {
        x: { grid: { display: true, drawTicks: true, color: (c) => { const m = M[c.index]; return (m && m.slice(5) === '01') ? 'rgba(0,0,0,0.12)' : 'transparent'; } },
             ticks: { font: { size: 8 }, color: '#6b7280', autoSkip: false, maxRotation: 0, minRotation: 0, padding: 2,
              callback: function (v, i) { const m = M[i]; if (!m) return ''; const mm = +m.slice(5); return mm === 1 ? [String(mm), m.slice(0, 4) + '년'] : String(mm); } } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 }, color: '#6b7280', callback: v => Number(v).toLocaleString() } }
      }
    }
  });

  // ===== 전문가 카드 =====
  function card(e) {
    const unv = !e.verified;
    const hz = (e.x == null) ? '⏳ 시점 미정' : e.horizon_lbl;
    return '<div class="ecard ' + e.side + '" data-ei="' + D.experts.indexOf(e) + '">' +
      '<div class="top"><span class="nm">' + e.name + '</span><span class="org">' + e.org + '</span>' +
      '<span class="hz">' + hz + '</span></div>' +
      '<div class="call ' + e.side + '">' + (e.side === 'bull' ? '▲ ' : '▼ ') + e.call + '</div>' +
      '<div class="th">' + e.thesis + '</div>' +
      '<div class="meta"><span class="tag">목표: ' + e.target + '</span>' +
      '<span class="tag">확신도 ' + e.conf + '</span>' +
      '<span class="tag ' + (unv ? 'unv' : '') + '">출처: ' + e.source + '</span></div></div>';
  }
  document.getElementById('bullCards').innerHTML = bulls.map(card).join('') || '<div class="th" style="color:#94a3b8">등록된 강세론 없음</div>';
  document.getElementById('bearCards').innerHTML = bears.map(card).join('') || '<div class="th" style="color:#94a3b8">등록된 약세론 없음</div>';
  document.querySelectorAll('.pv .ecard').forEach(c => c.addEventListener('click', () => {
    const ei = +c.dataset.ei; if (D.experts[ei]) openExModal(D.experts[ei]);
  }));

  // ===== 모달 =====
  const modal = document.getElementById('pvModal'), box = document.getElementById('pvBox');
  function openModal(html, mc) { box.style.setProperty('--mc', mc); box.innerHTML = '<button class="mc" id="pvClose">✕</button>' + html; modal.classList.add('open');
    document.getElementById('pvClose').addEventListener('click', () => modal.classList.remove('open')); }
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

  window.openEvModal = function (e) {
    openModal(
      '<h3>' + e.title + '</h3><div class="sub">' + mLabelKr(e.month) + ' · ' + e.cat + '</div>' +
      '<div class="pillrow"><span class="p ' + e.side + '">' + SIDE_KR[e.side] + '</span><span class="p cat">' + e.cat + '</span>' +
      (e.future ? '<span class="p neu">미래 캐털리스트</span>' : '') + '</div>' +
      '<div class="sec"><span class="lbl">설명</span>' + e.desc + '</div>' +
      '<div class="sec"><span class="lbl">출처</span>' + e.source + '</div>',
      SIDE_COLOR[e.side]);
  };
  window.openExModal = function (e) {
    openModal(
      '<h3>' + e.name + ' <span style="font-size:13px;color:#667085;font-weight:600">' + e.org + '</span></h3>' +
      '<div class="sub">' + (e.role || '') + ' · 전망 시점 ' + e.horizon_lbl + ' · 기준 ' + e.asOf + '</div>' +
      '<div class="pillrow"><span class="p ' + e.side + '">' + (e.side === 'bull' ? '강세(BULL)' : '약세(BEAR)') + '</span>' +
      '<span class="p cat">' + e.call + '</span><span class="p neu">확신도 ' + e.conf + '</span></div>' +
      '<div class="sec"><span class="lbl">논거 (Thesis)</span>' + e.thesis + '</div>' +
      '<div class="sec"><span class="lbl">반대 시나리오 / 리스크</span>' + e.risk + '</div>' +
      '<div class="sec"><span class="lbl">목표 / 포지션</span>' + e.target + '</div>' +
      '<div class="sec"><span class="lbl">출처</span>' + e.source + (e.verified ? '' : ' <span style="color:#b45309">(미검증 — 교체 필요)</span>') + '</div>',
      e.side === 'bull' ? '#16a34a' : '#dc2626');
  };
}


initSidebar();
document.querySelector('[data-seg="all"]').classList.add('active');
document.querySelector('[data-metric="revenue"]').classList.add('active');
document.querySelector('[data-view="summary"]').classList.add('active');
renderView();

  </script>
</body>
</html>
