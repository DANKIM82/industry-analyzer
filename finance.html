// 범례 칩 렌더링
function renderLegend(containerId, datasets, chart) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  datasets.forEach((ds, i) => {
    const chip = document.createElement('span');
    chip.className = 'legend-chip';
    chip.style.borderColor = ds.borderColor || COLORS[i];
    chip.style.color = ds.borderColor || COLORS[i];
    chip.innerHTML = '<span class="dot" style="background:' + (ds.borderColor||COLORS[i]) + '"></span>' + ds.label;
    chip.addEventListener('click', () => {
      const meta = chart.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      chip.classList.toggle('hidden', meta.hidden);
      chart.update();
    });
    el.appendChild(chip);
  });
}

// 사이드바 모바일 토글
function initSidebar() {
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const closeBtn = document.getElementById('sidebarClose');
  if (menuBtn) menuBtn.addEventListener('click', () => {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  });
  if (overlay) overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
  if (closeBtn) closeBtn.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
}

// 엑셀 다운로드 (CSV 방식)
function downloadCsv(filename, headers, rows) {
  const BOM = '\uFEFF';
  const csv = BOM + [headers.join(','), ...rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','))].join('\r\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">영업수익 (최근분기)</div><div class="kpi-value">${Number(c.revenue[latest]).toLocaleString('ko-KR')}<span style="font-size:13px;color:#6b7280">억</span></div></div>
      <div class="kpi-card"><div class="kpi-label">영업이익</div><div class="kpi-value">${Number(c.opProfit[latest]).toLocaleString('ko-KR')}<span style="font-size:13px;color:#6b7280">억</span></div><div class="kpi-sub">이익률 ${(c.opProfit[latest]/c.revenue[latest]*100).toFixed(1)}%</div></div>
      <div class="kpi-card"><div class="kpi-label">당기순이익</div><div class="kpi-value">${Number(c.netProfit[latest]).toLocaleString('ko-KR')}<span style="font-size:13px;color:#6b7280">억</span></div></div>
      ${c.kics[latest] ? '<div class="kpi-card"><div class="kpi-label">K-ICS 비율</div><div class="kpi-value">' + c.kics[latest] + '<span style="font-size:13px;color:#6b7280">%</span></div><div class="kpi-sub">기준 150%</div></div>' : ''}
      ${c.lossRatio[latest] ? '<div class="kpi-card"><div class="kpi-label">손해율</div><div class="kpi-value">' + c.lossRatio[latest].toFixed(1) + '<span style="font-size:13px;color:#6b7280">%</span></div></div>' : ''}
      ${c.combined[latest] ? '<div class="kpi-card"><div class="kpi-label">합산비율</div><div class="kpi-value">' + c.combined[latest].toFixed(1) + '<span style="font-size:13px;color:#6b7280">%</span></div></div>' : ''}
    </div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">영업수익 / 영업이익</div>
        <div class="chart-scroll"><canvas id="revChart" height="260"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">순이익 추이</div>
        <div class="chart-scroll"><canvas id="netChart" height="260"></canvas></div>
      </div>
    </div>
    ${c.lossRatio.some(v=>v) ? `<div class="panel" style="margin-top:20px">
      <div class="panel-title">손해율 / 합산비율</div>
      <div class="chart-scroll"><canvas id="ratioChart" height="240"></canvas></div>
    </div>` : ''}
    ${c.kics.some(v=>v) ? `<div class="panel" style="margin-top:20px">
      <div class="panel-title">K-ICS 비율 추이</div>
      <div class="chart-scroll"><canvas id="kicsChartC" height="240"></canvas></div>
    </div>` : ''}
  `;

  charts.rev = makeBarChart('revChart', ql, [
    { label: '영업수익', data: c.revenue.slice(periodStart, periodEnd+1), backgroundColor: '#2563eb88' },
    { label: '영업이익', data: c.opProfit.slice(periodStart, periodEnd+1), backgroundColor: '#16a34a88' }
  ], { showLegend: true });

  charts.net = makeLineChart('netChart', ql, [{
    label: '당기순이익', data: c.netProfit.slice(periodStart, periodEnd+1),
    borderColor: '#7c3aed', backgroundColor: '#7c3aed22',
    tension: 0.35, borderWidth: 2.5, fill: true, pointRadius: 4
  }]);

  if (c.lossRatio.some(v=>v)) {
    charts.ratio = makeLineChart('ratioChart', ql, [
      { label: '손해율', data: c.lossRatio.slice(periodStart, periodEnd+1), borderColor: '#dc2626', backgroundColor: '#dc262622', tension: 0.35, borderWidth: 2, pointRadius: 3, spanGaps: true },
      { label: '합산비율', data: c.combined.slice(periodStart, periodEnd+1), borderColor: '#d97706', backgroundColor: '#d9770622', tension: 0.35, borderWidth: 2, pointRadius: 3, spanGaps: true }
    ], { unit: '%' });
  }
  if (c.kics.some(v=>v)) {
    charts.kicsC = makeLineChart('kicsChartC', ql, [{
      label: 'K-ICS 비율', data: c.kics.slice(periodStart, periodEnd+1),
      borderColor: '#0891b2', backgroundColor: '#0891b222',
      tension: 0.35, borderWidth: 2.5, pointRadius: 4, spanGaps: true
    }], { unit: '%' });
  }
}

function exportSummary() {
  const companies = filteredCompanies();
  const ql = FINANCE_DATA.meta.quarters.slice(periodStart, periodEnd+1);
  const ml = METRIC_LABELS[currentMetric];
  const headers = ['분기', ...companies.map(c => c.name)];
  const rows = ql.map((q,qi) => {
    const actualIdx = periodStart + qi;
    return [q, ...companies.map(c => c[currentMetric][actualIdx] ?? '')];
  });
  downloadCsv('금융사_' + ml.label + '.csv', headers, rows);
}

initSidebar();
document.querySelector('[data-type="all"]').classList.add('active');
document.querySelector('[data-metric="revenue"]').classList.add('active');
document.querySelector('[data-view="summary"]').classList.add('active');
renderView();

  </script>
</body>
</html>
