  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --text: #18212f;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

  .topbar {
    display: none;
    position: sticky; top: 0; z-index: 30;
    height: var(--topbar-h);
    background: var(--sidebar);
    color: #e5e7eb;
    padding: 0 16px;
    align-items: center;
    gap: 12px;

  .topbar .brand { flex: 1; font-size: 15px; font-weight: 700; }
  .hamburger {
    background: none; border: none; cursor: pointer;
    color: #e5e7eb; padding: 6px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .hamburger span {
    display: block; width: 22px; height: 2px;
    background: currentColor; border-radius: 2px;
  }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 40;
  }
  .sidebar-overlay.active { display: block; }
  .app { display: flex; min-height: 100vh; }
  aside {
    width: var(--sidebar-w);
    background: var(--sidebar);
    color: #e5e7eb;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header .brand {
    font-size: 13px; font-weight: 700; line-height: 1.4;
    color: #f9fafb;
  }
  .sidebar-close { display: none; background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 18px; }
  .company-list { padding: 8px 0; }
  .company-list .label {
    padding: 8px 16px 4px;
    font-size: 10px; font-weight: 600;
    color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .nav button {
    display: block; width: 100%;
    padding: 8px 16px;
    background: none; border: none; cursor: pointer;
    color: #9ca3af; font-size: 13px; text-align: left;
    transition: background 0.15s, color 0.15s;
    border-radius: 0;
  }
  .nav button:hover { background: rgba(255,255,255,0.06); color: #e5e7eb; }
  .nav button.active { background: rgba(255,255,255,0.1); color: #ffffff; font-weight: 600; }
  main {
    flex: 1; padding: 28px 32px;
    min-width: 0; overflow-x: hidden;
  }
  header { margin-bottom: 20px; }
  header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  header .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 24px; align-items: center;
  }
  .controls button {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--panel); color: var(--muted);
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .controls select {
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--panel);
    color: var(--text); font-size: 13px; cursor: pointer;
  }
  .controls .sep { color: var(--muted); font-size: 13px; }
  .grid { display: flex; flex-direction: column; gap: 20px; }
  .panel {
    background: var(--panel); border-radius: 10px;
    border: 1px solid var(--line);
    padding: 20px;
    overflow: hidden;
  }
  .panel-title {
    font-size: 15px; font-weight: 600; color: var(--text);
    margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-hint { font-size: 11px; color: var(--muted); font-weight: 400; }
  .chart-wrap { position: relative; width: 100%; overflow: hidden; }
  .chart-scroll { overflow-x: auto; padding-bottom: 6px; }
  .chart-scroll canvas { min-width: 600px; }
  .legend-area {
    margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .legend-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    border: 1.5px solid; cursor: pointer;
    font-size: 12px; font-weight: 500;
    transition: opacity 0.15s;
  }
  .legend-chip.hidden { opacity: 0.35; }
  .legend-chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .btn-sm {
    padding: 5px 12px; border-radius: 5px;
    border: 1px solid var(--line);
    background: var(--panel); color: var(--muted);
    cursor: pointer; font-size: 12px;
  }
  .btn-sm:hover { background: var(--bg); }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    padding: 10px 8px; background: var(--bg);
    font-weight: 600; color: var(--muted);
    border-bottom: 1px solid var(--line);
    text-align: right; white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  thead th:nth-child(2) { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:hover { background: #f8fafc; }
  tbody td {
    padding: 9px 8px; text-align: right;
    color: var(--text); white-space: nowrap;
  }
  tbody td:first-child { text-align: left; color: var(--muted); font-size: 12px; }
  tbody td:nth-child(2) { text-align: left; font-weight: 600; }
  .pos { color: #16a34a; }
  .neg { color: #dc2626; }
  .excel-btn {
    padding: 7px 14px; border-radius: 6px;
    background: #16a34a; color: #fff;
    border: none; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .excel-btn:hover { background: #15803d; }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--panel); border-radius: 8px;
    border: 1px solid var(--line); padding: 14px 16px;

  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .kpi-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .kpi-up { color: #16a34a; }
  .kpi-dn { color: #dc2626; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  @media(max-width: 768px) {

const COLORS = [
  '#2563eb','#16a34a','#dc2626','#d97706','#7c3aed',
  '#db2777','#0891b2','#65a30d','#ea580c','#9333ea',
  '#0284c7','#059669','#b91c1c','#b45309','#6d28d9'
];

function fmt(n, digits=0) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toLocaleString('ko-KR', {minimumFractionDigits: digits, maximumFractionDigits: digits});
}
function fmtPct(n, digits=1) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toFixed(digits) + '%';
}
function fmtChange(n, unit='') {
  if (n === null || n === undefined || isNaN(n)) return '-';
  const sign = n > 0 ? '+' : '';
  return sign + Number(n).toLocaleString('ko-KR') + unit;
}
function arrow(n) {
  if (!n || isNaN(n)) return '';
  return n > 0 ? '<span class="pos">▲</span>' : '<span class="neg">▼</span>';
}

// 범용 라인 차트 생성
function makeLineChart(canvasId, labels, datasets, opts={}) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: opts.ratio || false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.92)',
          titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          padding: 10, borderColor: '#334155', borderWidth: 1,
          callbacks: {
            label: function(ctx) {
              const v = ctx.raw;
              if (v === null || v === undefined) return ctx.dataset.label + ': -';
              const unit = opts.unit || '';
              return ctx.dataset.label + ': ' + Number(v).toLocaleString('ko-KR') + unit;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#6b7280', maxRotation: 45 }
        },
        y: {
          title: { display: !!opts.unit && opts.unit !== '%', text: (opts.unit && opts.unit !== '%') ? opts.unit : '', font: { size: 11 }, color: '#94a3b8' },
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#6b7280',
            callback: function(v) { if (opts.unit === '%') return v + '%'; return Number(v).toLocaleString('ko-KR', { maximumFractionDigits: 0 }); } }
        },
        ...(opts.y2 ? {
          y1: {
            type: 'linear', position: 'right',
            grid: { drawOnChartArea: false },
            ticks: {
              font: { size: 11 }, color: '#6b7280',
              callback: v => v.toFixed(1) + '%'
            }
          }
        } : {})
      }
    }
  });
}

// 막대 차트 생성
function makeBarChart(canvasId, labels, datasets, opts={}) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: opts.showLegend || false, position: 'bottom', labels: { font: { size: 11 } } },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.92)',
          titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + Number(ctx.raw).toLocaleString('ko-KR') + (opts.unit || '')
          }
        }
      },
      scales: {
        x: {
          stacked: opts.stacked || false,
          grid: { display: false },
          ticks: { font: { size: 11 }, color: '#6b7280', maxRotation: 45 }
        },
        y: {
          stacked: opts.stacked || false,
          title: { display: !!opts.unit && opts.unit !== '%', text: (opts.unit && opts.unit !== '%') ? opts.unit : '', font: { size: 11 }, color: '#94a3b8' },
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#6b7280',
            callback: function(v) { if (opts.unit === '%') return v + '%'; return Number(v).toLocaleString('ko-KR', { maximumFractionDigits: 0 }); } }
        }
      }
    }
  });
}

// 도넛 차트 생성
function makeDonutChart(canvasId, labels, data, colors) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.label + ': ' + ctx.raw.toFixed(1) + '%'
          }
        }
      },
      cutout: '60%'
    }
  });
}

// 범례 칩 렌더링
function renderLegend(containerId, datasets, chart) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  datasets.forEach((ds, i) => {
    const chip = document.createElement('span');
    chip.className = 'legend-chip';
    chip.style.borderColor = ds.borderColor || COLORS[i];
    chip.style.color = ds.borderColor || COLORS[i];
    chip.innerHTML = '<span class="dot" style="background:' + (ds.borderColor||COLORS[i]) + '"></span>' + ds.label;
    chip.addEventListener('click', () => {
      const meta = chart.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      chip.classList.toggle('hidden', meta.hidden);
      chart.update();
    });
    el.appendChild(chip);
  });
}

// 사이드바 모바일 토글
function initSidebar() {
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const closeBtn = document.getElementById('sidebarClose');
  if (menuBtn) menuBtn.addEventListener('click', () => {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  });
  if (overlay) overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
  if (closeBtn) closeBtn.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
}

// 엑셀 다운로드 (CSV 방식)
function downloadCsv(filename, headers, rows) {
  const BOM = '\uFEFF';
  const csv = BOM + [headers.join(','), ...rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','))].join('\r\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

// ── 데이터 소스 연결: DART 실데이터(window.INDUSTRY_DATA_GAMING) 우선, 없으면 샘플 ──
let IS_SAMPLE = true;
function buildLiveData(records) {
  const quarters = [...new Set(records.map(r => r.quarter))].sort();
  const names = [...new Set(records.map(r => r.company))];
  const get = (name, q, f) => {
    const r = records.find(x => x.company === name && x.quarter === q);
    const v = r ? r[f] : null;
    return (v === null || v === undefined) ? 0 : v;
  };
  const companies = names.map(name => {
    const mobileRatio = quarters.map(q => get(name, q, 'mobile_ratio'));
    return {
      name,
      revenue: quarters.map(q => get(name, q, 'revenue')),
      opProfit: quarters.map(q => get(name, q, 'op_income')),
      opMargin: quarters.map(q => get(name, q, 'op_margin')),
      netProfit: quarters.map(q => get(name, q, 'net_income')),
      netMargin: quarters.map(q => get(name, q, 'net_margin')),
      opCashflow: quarters.map(q => get(name, q, 'op_cashflow')),
      eps: quarters.map(q => get(name, q, 'eps')),
      roe: quarters.map(q => get(name, q, 'roe')),
      globalRatio: quarters.map(q => get(name, q, 'overseas_ratio')),
      mobileRatio,
      pcRatio: mobileRatio.map(m => m ? +(100 - m).toFixed(1) : 0),
      mau: quarters.map(q => get(name, q, 'mau'))
    };
  });
  return { meta: { title: GAME_SAMPLE.meta.title, quarters }, companies };
}

// 표시 단위 통일: 금액 지표(십억원) → 십억원(÷10). %/원(EPS)/카운트 지표는 변환하지 않음.
Object.keys(METRIC_LABELS).forEach(k => {

function destroyAll() {
  Object.values(charts).forEach(c => { if(c) c.destroy(); });
  Object.keys(charts).forEach(k => delete charts[k]);
}

function renderView() {
  const main = document.getElementById('mainContent');
  destroyAll();
  const ql = qs.slice(periodStart, periodEnd + 1);
  if (currentView === 'summary') renderSummaryView(main, ql);
  else if (currentView === 'global') renderGlobalView(main, ql);
  else if (currentView === 'company') renderCompanyView(main, ql);
}

function renderSummaryView(main, ql) {
  const ml = METRIC_LABELS[currentMetric];

    label: c.name, data: c[currentMetric].slice(periodStart, periodEnd+1),

  main.innerHTML = `
    <div class="panel">
      <div class="panel-title">${ml.label} 분기별 추이 <span class="panel-hint">(${ml.unit})</span></div>
      <div class="chart-scroll"><canvas id="mainChart" height="320"></canvas></div>
      <div class="legend-area" id="mainLegend"></div>
    </div>
    <div class="panel" style="margin-top:20px">
      <div class="panel-title">분기별 비교 <button class="excel-btn" onclick="exportSummary()">⬇ CSV</button></div>
      <div style="overflow-x:auto"><table><thead><tr>
        <th>분기</th>${GAME_DATA.companies.map(c=>'<th>'+c.name+'</th>').join('')}
      </tr></thead><tbody id="summaryTbody"></tbody></table></div>
    </div>
  `;
  charts.main = makeLineChart('mainChart', ql, datasets, { unit: ml.unit });
  renderLegend('mainLegend', datasets, charts.main);
  const tbody = document.getElementById('summaryTbody');
  ql.forEach((q,qi) => {
    const ai = periodStart+qi;
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>' + q + '</td>' + GAME_DATA.companies.map(c => {
      const v = c[currentMetric][ai];
      if(v == null) return '<td>-</td>';
      const isPct = ml.unit === '%';
      return '<td>' + (isPct ? v.toFixed(1)+'%' : Number(v).toLocaleString('ko-KR')) + '</td>';
    }).join('');
    tbody.appendChild(tr);
  });
}

function exportSummary() {

    return [q, ...GAME_DATA.companies.map(c => c[currentMetric][ai] ?? '')];
  });
  downloadCsv('게임_' + ml.label + '.csv', headers, rows);
}
