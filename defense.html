  aside {

  .sidebar-header {
    padding: 20px 16px 12px;

  .sidebar-header .brand {
    font-size: 13px; font-weight: 700; line-height: 1.4;

  .company-list { padding: 8px 0; }
  .company-list .label {
    padding: 8px 16px 4px;
    font-size: 10px; font-weight: 600;

  .nav button {
    display: block; width: 100%;
    padding: 8px 16px;

  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button.active {

  .controls select {

  .controls .sep { color: var(--muted); font-size: 13px; }

          }
        }
      },
      cutout: '60%'
    }
  });
}

// 범례 칩 렌더링
function renderLegend(containerId, datasets, chart) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  datasets.forEach((ds, i) => {
    const chip = document.createElement('span');
    chip.className = 'legend-chip';
    chip.style.borderColor = ds.borderColor || COLORS[i];
    chip.style.color = ds.borderColor || COLORS[i];
    chip.innerHTML = '<span class="dot" style="background:' + (ds.borderColor||COLORS[i]) + '"></span>' + ds.label;
    chip.addEventListener('click', () => {
      const meta = chart.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      chip.classList.toggle('hidden', meta.hidden);
      chart.update();
    });
    el.appendChild(chip);
  });
}

// 사이드바 모바일 토글
function initSidebar() {
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const closeBtn = document.getElementById('sidebarClose');
  if (menuBtn) menuBtn.addEventListener('click', () => {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  });
  if (overlay) overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
  if (closeBtn) closeBtn.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
}

// 엑셀 다운로드 (CSV 방식)
function downloadCsv(filename, headers, rows) {
  const BOM = '\uFEFF';
  const csv = BOM + [headers.join(','), ...rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','))].join('\r\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

  const FIELD_MAP = {

    netProfit: 'net_income', netMargin: 'net_margin', opCashflow: 'op_cashflow',
    eps: 'eps', roe: 'roe',
    orderDomestic: 'domestic_order', orderExport: 'export_order',
    exportRatio: 'export_ratio', backlog: 'backlog'
  };
  const quarters = [...new Set(records.map(r => r.quarter))].sort();
  const names = [...new Set(records.map(r => r.company))];
  const companies = names.map(name => {
    const o = { name };
    for (const key in FIELD_MAP) {
      const src = FIELD_MAP[key];
      o[key] = quarters.map(q => {
        const r = records.find(x => x.company === name && x.quarter === q);
        const v = r ? r[src] : null;
        return (v === null || v === undefined) ? 0 : v;
      });
    }
    return o;
  });
  return { meta: { title: DEFENSE_SAMPLE.meta.title, quarters }, companies };
